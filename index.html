    background: radial-gradient(circle at center, rgba(0,0,0,0.85) 0%, rgba(0,0,0,0.96) 100%);

    overflow: hidden;
    cursor: pointer;
    user-select: none;

  @keyframes chestFade { from { opacity: 0; } to { opacity: 1; } }

  .chest-beams {
    position: absolute;
    width: 700px; height: 700px;
    background: conic-gradient(from 0deg,

  @keyframes chestBeamFade { from { opacity: 0; transform: scale(0.4) rotate(0deg); } to { opacity: 1; transform: scale(1) rotate(180deg); } }

  .chest-flash {
    position: absolute;
    width: 320px; height: 320px;
    background: radial-gradient(circle, rgba(255, 251, 230, 0.95) 0%, rgba(253, 224, 71, 0.6) 25%, rgba(251, 191, 36, 0.25) 55%, transparent 100%);

    animation: chestFlash 1.8s ease-out forwards;
    pointer-events: none;
  }
  @keyframes chestFlash {
    0% { transform: scale(0); opacity: 0; }
    8% { transform: scale(1.6); opacity: 1; }
    50% { transform: scale(1.1); opacity: 0.75; }
    100% { transform: scale(1); opacity: 0.45; }
  }

  .chest-particle {
    position: absolute;
    background: #fde047;
    box-shadow: 0 0 8px #fde047, 0 0 16px #fbbf24;
    border-radius: 50%;
    animation: chestParticle 1.8s ease-out forwards;
    pointer-events: none;

// Pull all of a user's data from Supabase.
const cloudPull = async (user) => {
  if (!sb) return { ok: false, error: "Supabase not configured" };
  try {
    const [s, b, f, t] = await Promise.all([
      sb.from("sessions").select("session_key,data").eq("user_id", user),
      sb.from("bodyweight").select("date,weight").eq("user_id", user),
      sb.from("food_log").select("date,data").eq("user_id", user),
      sb.from("diet_targets").select("data").eq("user_id", user).maybeSingle(),
    ]);
    if (s.error) throw s.error;
    if (b.error) throw b.error;
    // food_log / diet_targets are optional — if the tables don't exist yet, don't fail the whole pull.
    const sessions = {}; (s.data || []).forEach(r => { sessions[r.session_key] = r.data; });
    const bodyweight = {}; (b.data || []).forEach(r => { bodyweight[r.date] = r.weight; });
    const foodLog = {}; (f && !f.error ? (f.data || []) : []).forEach(r => { foodLog[r.date] = r.data; });
    const dietTargets = (t && !t.error && t.data) ? t.data.data : null;
    return { ok: true, sessions, bodyweight, foodLog, dietTargets };
  } catch (e) {
    return { ok: false, error: e.message || "fetch failed" };
  }
};

const parseRest = (s) => { const m = s.match(/(\d+)/); if (!m) return 120; const n = parseInt(m[1]); return s.includes("min") ? n * 60 : n; };

const computeMetric = (sessionData, metric) => {
  const setKeys = Object.keys(sessionData || {}).filter(s => /^\d+$/.test(s));
  if (setKeys.length === 0) return 0;
  if (metric === "top") {
    return Math.max(...setKeys.map(si => parseFloat(sessionData[si].weight) || 0));
  }
  if (metric === "volume") {
    return setKeys.reduce((sum, si) => {
      const w = parseFloat(sessionData[si].weight) || 0;
      const r = parseInt(sessionData[si].reps) || 0;
      return sum + w * r;
    }, 0);
  }
  if (metric === "e1rm") {
    let max = 0;
    for (const si of setKeys) {
      const w = parseFloat(sessionData[si].weight) || 0;
      const r = parseInt(sessionData[si].reps) || 0;
      if (w === 0 || r === 0) continue;
      const e1rm = r === 1 ? w : w * (1 + r / 30);
      if (e1rm > max) max = e1rm;
    }
    return Math.round(max);
  }
  if (metric === "reps") {
    return Math.max(...setKeys.map(si => parseInt(sessionData[si].reps) || 0));
  }
  return 0;
};

const findExerciseMeta = (id) => {
  for (let di = 0; di < DAYS.length; di++) {
    const d = DAYS[di];
    const primary = d.exercises.find(e => e.id === id);
    if (primary) return { name: primary.name, type: "primary", dayId: d.id, dayIndex: di };
  }
  for (const d of DAYS) {
    for (const p of d.exercises) {
      const alt = p.alts?.find(a => a.id === id);
      if (alt) return { name: alt.name, type: "alt" };
    }
  }
  for (const dayId in ACCESSORIES) {
    const acc = ACCESSORIES[dayId].find(a => a.id === id);
    if (acc) return { name: acc.name, type: "accessory" };
  }
  return { name: id, type: "unknown" };
};

const computeDelta = (current, old) => {
  if (!old || old === 0) return null;
  return { delta: current - old, pct: ((current - old) / old) * 100 };
};

// DIET — helpers + views (Eat tab, Today tab). Reference data (PLAN,
// FOODS, CRAVINGS, …) is loaded as globals from diet-data.js.

const MACRO = { carb: "#f2a93b", protein: "#34d399", fat: "#818cf8" };
const TAGHEX = { cook: "#34d399", deliver: "#5B9BD5" };

const weekdayIdx = () => (new Date().getDay() + 6) % 7; // Monday = 0
const gramsFor = (food, amount, unitName) => {
  const u = food.units.find(x => x[0] === unitName) || food.units[0];
  return amount * u[1];
};
const macrosFor = (food, amount, unitName) => {
  const grams = gramsFor(food, amount, unitName);
  return {
    c: +(food.per100.c * grams / 100).toFixed(1),
    p: +(food.per100.p * grams / 100).toFixed(1),
    f: +(food.per100.f * grams / 100).toFixed(1),
  };
};
const dietKcal = (c, p, f) => Math.round((c * 4 + p * 4 + f * 9) / 10) * 10;
const sumMacros = (entries) => (entries || []).reduce((s, x) => ({ c: s.c + (x.c || 0), p: s.p + (x.p || 0), f: s.f + (x.f || 0) }), { c: 0, p: 0, f: 0 });

const searchFoods = (query, limit = 8) => {
  const t = query.toLowerCase().replace(/[^a-z0-9%\s]/g, "").trim();
  if (!t) return [];
  const scored = [];
  for (const f of FOODS) {
    let score = 0;
    if (f.name.toLowerCase() === t) score = 100;
    else if (f.name.toLowerCase().startsWith(t)) score = 80;
    else if (f.name.toLowerCase().includes(t)) score = 60;
    for (const key of f.k) {
      if (key === t) score = Math.max(score, 95);
      else if (key.startsWith(t)) score = Math.max(score, 70);
      else if (key.includes(t) || t.includes(key)) score = Math.max(score, 50);
    }
    if (score > 0) scored.push({ f, score });
  }
  scored.sort((a, b) => b.score - a.score);
  return scored.slice(0, limit).map(s => ({ name: s.f.name, per100: s.f.per100, units: s.f.units }));
};

// Macros logged today for the strength side: which day (if any) was trained.
const trainingToday = (log, tk) => {
  for (let i = 0; i < DAYS.length; i++) {
    const d = DAYS[i];
    const s = log.sessions?.[`${tk}-${d.id}`];
    if (!s) continue;
    const sets = Object.keys(s).filter(k => /^\d+$/.test(k) && ((parseFloat(s[k].weight) || 0) > 0 || (parseInt(s[k].reps) || 0) > 0));
    if (sets.length) return { dayIndex: i, day: d, volume: computeMetric(s, "volume"), setCount: sets.length };
  }
  return null;
};

// ─── Reusable bits ───────────────────────────────────────────────────
function Ring({ value, target, color, label, sub, over }) {
  const r = 30, circ = 2 * Math.PI * r;
  const pct = target ? Math.min(value / target * 100, 100) : 0;
  const dash = pct / 100 * circ;
  return (
    <div style={{ textAlign: "center" }}>
      <div style={{ position: "relative", width: 74, height: 74, margin: "0 auto 6px" }}>
        <svg width="74" height="74" viewBox="0 0 74 74" style={{ transform: "rotate(-90deg)" }}>
          <circle cx="37" cy="37" r={r} fill="none" stroke="#1E1E1E" strokeWidth="7" />
          {target ? <circle cx="37" cy="37" r={r} fill="none" stroke={over ? "#f87171" : color} strokeWidth="7" strokeLinecap="round" strokeDasharray={`${dash} ${circ}`} /> : null}
        </svg>
        <div style={{ position: "absolute", inset: 0, display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center" }}>
          <span style={{ fontFamily: "monospace", fontSize: 16, fontWeight: 700, color: over ? "#f87171" : "#E8E8E8", lineHeight: 1 }}>{Math.round(value)}</span>
          <span style={{ fontSize: 9, color: "#666", marginTop: 1 }}>{target ? `/ ${target}g` : "kcal"}</span>
        </div>
      </div>
      <div style={{ fontSize: 10, color: "#888", fontFamily: "monospace", letterSpacing: 0.5, textTransform: "uppercase" }}>{label}</div>
      {sub && <div style={{ fontSize: 11, color: "#999", marginTop: 2 }}>{sub}</div>}
    </div>
  );
}

function BottomTabs({ active, onChange }) {

const cardStyle = { background: "#151515", border: "1px solid #222", borderRadius: 12 };
const ebStyle = { fontSize: 10, color: "#666", letterSpacing: 2, fontFamily: "monospace", textTransform: "uppercase" };

// ─── Macro tracker (search → portion → logged list) ──────────────────
function MacroTracker({ targets, foodToday, onAdd, onRemove, onClear }) {
  const [q, setQ] = useState("");
  const [results, setResults] = useState(null);
  const [pending, setPending] = useState(null);
  const [amount, setAmount] = useState(1);
  const [unit, setUnit] = useState("");

  const entries = foodToday.entries || [];
  const tot = sumMacros(entries);
  const c = Math.round(tot.c), p = Math.round(tot.p), f = Math.round(tot.f);
  const kc = dietKcal(tot.c, tot.p, tot.f);
  const carbT = targets.carb;

  const doSearch = () => { const r = searchFoods(q.trim(), 8); setResults(r); setPending(null); };
  const pick = (food) => { setPending(food); setUnit(food.units[0][0]); setAmount(1); setResults(null); };
  const preview = pending ? macrosFor(pending, parseFloat(amount) || 0, unit) : null;
  const confirm = () => {
    if (!pending) return;
    const amt = parseFloat(amount) || 0;
    const m = macrosFor(pending, amt, unit);
    const amtLabel = amt % 1 === 0 ? amt : amt.toFixed(2).replace(/0+$/, "").replace(/\.$/, "");
    onAdd({ label: pending.name, portion: `${amtLabel} ${unit}`, c: m.c, p: m.p, f: m.f });
    setPending(null); setQ(""); setResults(null);
  };

  const bannerOver = c > carbT;
  const bannerWarn = c >= carbT * 0.7 && c <= carbT;
  const bannerColor = bannerOver ? "#f87171" : bannerWarn ? "#f2a93b" : "#34d399";
  const bannerBg = bannerOver ? "#2A1414" : bannerWarn ? "#241B0C" : "#0E2018";
  const bannerTxt = entries.length === 0
    ? `Nothing logged — full ${carbT}g carb budget for today.`
    : bannerOver ? `Over carb target by ${c - carbT}g. Ketosis may pause — tighten up tomorrow.`
    : bannerWarn ? `Getting close — ${carbT - c}g of carbs left. Lean on protein and fat from here.`
    : `On track — ${carbT - c}g of carbs left before your ${carbT}g ceiling.`;

  const inputStyle = { background: "#0E0E0E", border: "1px solid #2A2A2A", borderRadius: 8, padding: "11px 12px", color: "#E8E8E8", fontFamily: "inherit", fontSize: 14, width: "100%" };

  return (
    <div style={{ ...cardStyle, overflow: "hidden", marginBottom: 16 }}>
      <div style={{ padding: "16px 16px 14px", borderBottom: "1px solid #222" }}>
        <div style={ebStyle}>// live macro log</div>
        <div style={{ fontSize: 17, fontWeight: 700, margin: "6px 0 4px" }}>Track what you actually ate</div>
        <div style={{ fontSize: 12, color: "#888", marginBottom: 12 }}>Search a food, pick the match, dial in the amount — macros count against today's targets.</div>
        <div style={{ display: "flex", gap: 8 }}>
          <input value={q} onChange={e => setQ(e.target.value)} onKeyDown={e => e.key === "Enter" && doSearch()} placeholder="Search a food — ribeye, avocado…" style={{ ...inputStyle, flex: 1 }} />
          <button onClick={doSearch} style={{ background: "#34d399", color: "#0F0F0F", border: "none", borderRadius: 8, padding: "0 16px", fontWeight: 700, fontSize: 14, cursor: "pointer" }}>Search</button>
        </div>

        {results && (
          <div style={{ marginTop: 10, border: "1px solid #222", borderRadius: 8, overflow: "hidden" }}>
            {results.length === 0 && <div style={{ padding: 14, textAlign: "center", color: "#888", fontSize: 13 }}>No match. Try a simpler term — "chicken" not "chicken thigh".</div>}
            {results.map((r, i) => {
              const m = macrosFor(r, 1, r.units[0][0]);
              return (
                <button key={i} onClick={() => pick(r)} style={{ display: "flex", justifyContent: "space-between", alignItems: "center", width: "100%", gap: 10, padding: "11px 12px", background: "#121212", border: "none", borderBottom: i < results.length - 1 ? "1px solid #1E1E1E" : "none", textAlign: "left", cursor: "pointer" }}>
                  <span>
                    <span style={{ display: "block", fontSize: 14, color: "#E8E8E8", fontWeight: 500 }}>{r.name}</span>
                    <span style={{ display: "block", fontSize: 11, color: "#777", fontFamily: "monospace", marginTop: 2 }}>per {r.units[0][0]}: {m.c}g C · {m.p}g P · {m.f}g F</span>
                  </span>
                  <span style={{ fontFamily: "monospace", fontSize: 10, color: "#34d399", background: "#0E2018", padding: "3px 7px", borderRadius: 5 }}>built-in</span>
                </button>
              );
            })}
          </div>
        )}

        {pending && (
          <div style={{ marginTop: 12, background: "#0E0E0E", border: "2px solid #34d399", borderRadius: 10, padding: 14 }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 12 }}>
              <div>
                <div style={{ fontSize: 15, fontWeight: 600 }}>{pending.name}</div>
                <div style={{ fontFamily: "monospace", fontSize: 11, color: "#777", marginTop: 2 }}>{pending.per100.c}g C · {pending.per100.p}g P · {pending.per100.f}g F per 100g</div>
              </div>
              <button onClick={() => setPending(null)} style={{ background: "none", border: "none", color: "#888", fontSize: 20, cursor: "pointer", lineHeight: 1 }}>×</button>
            </div>
            <div style={{ display: "flex", alignItems: "center", gap: 8, flexWrap: "wrap", marginBottom: 12 }}>
              <button onClick={() => setAmount(a => Math.max(0, (parseFloat(a) || 0) - ((parseFloat(a) || 0) > 4 ? 1 : 0.25)))} style={stepBtn}>−</button>
              <input type="number" min="0" step="0.25" value={amount} onChange={e => setAmount(e.target.value)} style={{ width: 60, height: 36, textAlign: "center", background: "#151515", border: "1px solid #2A2A2A", borderRadius: 8, color: "#E8E8E8", fontFamily: "monospace", fontSize: 15, fontWeight: 600 }} />
              <button onClick={() => setAmount(a => (parseFloat(a) || 0) + ((parseFloat(a) || 0) >= 4 ? 1 : 0.25))} style={stepBtn}>+</button>
              <select value={unit} onChange={e => setUnit(e.target.value)} style={{ height: 36, background: "#151515", border: "1px solid #2A2A2A", borderRadius: 8, color: "#E8E8E8", fontFamily: "monospace", fontSize: 13, padding: "0 8px", cursor: "pointer" }}>
                {pending.units.map(u => <option key={u[0]} value={u[0]}>{u[0]}</option>)}
              </select>
              {preview && <div style={{ fontFamily: "monospace", fontSize: 13, marginLeft: "auto" }}>
                <span style={{ color: MACRO.carb, fontWeight: 700 }}>{preview.c}g</span> <span style={{ color: MACRO.protein, fontWeight: 700 }}>{preview.p}g</span> <span style={{ color: MACRO.fat, fontWeight: 700 }}>{preview.f}g</span>
              </div>}
            </div>
            <button onClick={confirm} style={{ width: "100%", background: "#34d399", color: "#0F0F0F", border: "none", borderRadius: 8, padding: 11, fontWeight: 700, fontSize: 14, cursor: "pointer" }}>Add to today's log</button>
          </div>
        )}
      </div>

      <div style={{ padding: "12px 16px", fontSize: 13, color: bannerColor, background: bannerBg, borderBottom: "1px solid #222" }}>{bannerTxt}</div>

      <div style={{ display: "grid", gridTemplateColumns: "repeat(4,1fr)", gap: 1, background: "#222" }}>
        <div style={{ background: "#151515", padding: "16px 4px" }}><Ring value={tot.c} target={carbT} color={MACRO.carb} label="Carbs" sub={`${Math.max(0, carbT - c)}g left`} over={c > carbT} /></div>
        <div style={{ background: "#151515", padding: "16px 4px" }}><Ring value={tot.p} target={targets.protein} color={MACRO.protein} label="Protein" sub={`${p}g`} /></div>
        <div style={{ background: "#151515", padding: "16px 4px" }}><Ring value={tot.f} target={targets.fat} color={MACRO.fat} label="Fat" sub={`${f}g`} /></div>
        <div style={{ background: "#151515", padding: "16px 4px" }}><Ring value={kc} target={0} color="#888" label="Energy" sub="est" /></div>
      </div>

      <div>
        {entries.length === 0
          ? <div style={{ padding: "22px 16px", textAlign: "center", color: "#666", fontSize: 13 }}>Your logged foods will appear here.</div>
          : entries.map((x, i) => (
            <div key={i} style={{ display: "grid", gridTemplateColumns: "1fr auto auto", gap: 12, alignItems: "center", padding: "11px 16px", borderBottom: "1px solid #1C1C1C" }}>
              <div>
                <div style={{ fontSize: 14, fontWeight: 500 }}>{x.label}</div>
                <div style={{ fontSize: 11, color: "#777", fontFamily: "monospace", marginTop: 2 }}>{x.portion ? x.portion + " · " : ""}P {x.p}g · F {x.f}g</div>
              </div>
              <div style={{ fontFamily: "monospace", fontWeight: 600, fontSize: 14, textAlign: "right" }}>{x.c}<span style={{ fontSize: 10, color: "#777" }}>g</span></div>
              <button onClick={() => onRemove(i)} style={{ background: "none", border: "none", color: "#888", fontSize: 18, cursor: "pointer", padding: "2px 4px" }}>×</button>
            </div>
          ))}
      </div>

      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "12px 16px", borderTop: "1px solid #222" }}>
        <button onClick={onClear} style={{ fontFamily: "monospace", fontSize: 12, background: "none", border: "1px solid #333", color: "#888", padding: "7px 12px", borderRadius: 7, cursor: "pointer" }}>↺ clear day</button>
        <div style={{ fontSize: 13, color: "#888" }}>Day total: <b style={{ fontFamily: "monospace", color: "#E8E8E8" }}>{c}g</b> net carbs</div>
      </div>
    </div>
  );
}
const stepBtn = { width: 36, height: 36, borderRadius: 8, border: "1px solid #2A2A2A", background: "#151515", color: "#E8E8E8", fontSize: 18, cursor: "pointer", lineHeight: 1 };

function App() {
  const [activeDay, setActiveDay] = useState(0);
  const [currentUser, setCurrentUser] = useState(loadCurrentUser);
  const [maxHR, setMaxHRState] = useState(() => localStorage.getItem(`st-maxhr::${loadCurrentUser()}`) || "");
  const setMaxHR = (val) => {
    setMaxHRState(val);
    try { if (val) localStorage.setItem(`st-maxhr::${currentUser}`, val); else localStorage.removeItem(`st-maxhr::${currentUser}`); } catch {}
  };
  const [log, setLog] = useState(() => { migrateLegacy(loadCurrentUser()); return load(loadCurrentUser()); });
  const [activeSet, setActiveSet] = useState(null);
  const [historyView, setHistoryView] = useState(null);
  const [restTimer, setRestTimer] = useState(null);
  const [restLeft, setRestLeft] = useState(0);
  const [showEmailBanner, setShowEmailBanner] = useState(false);
  const [emailSent, setEmailSent] = useState({});
  const [swapPickerFor, setSwapPickerFor] = useState(null);
  const [showAccessoryPicker, setShowAccessoryPicker] = useState(false);
  const [historyMetric, setHistoryMetric] = useState("top");
  const [showAllHistory, setShowAllHistory] = useState(false);
  const [editingScheme, setEditingScheme] = useState(null);
  const [draftScheme, setDraftScheme] = useState({ sets: "", reps: "" });
  const [saveStatus, setSaveStatus] = useState({});
  const [overviewView, setOverviewView] = useState(false);
  const [chestOpen, setChestOpen] = useState(false);
  const [activeTab, setActiveTab] = useState("today");
  const prevCompleteRef = useRef({});
  const prevCompleted = useRef(0);
  const autoSavedRef = useRef({});

  const persist = useCallback((fn) => {
    setLog(prev => {
      const next = typeof fn === 'function' ? fn(prev) : fn;
      save(currentUser, next);
      return next;
    });
  }, [currentUser]);

  // On user switch / first load: swap in that user's local cache, then merge cloud data.
  const didInitUser = useRef(false);
  useEffect(() => {
    try { localStorage.setItem(CURRENT_USER_KEY, currentUser); } catch {}
    migrateLegacy(currentUser);
    if (didInitUser.current) { setLog(load(currentUser)); setMaxHRState(localStorage.getItem(`st-maxhr::${currentUser}`) || ""); }
    didInitUser.current = true;
    let cancelled = false;
    (async () => {
      const res = await cloudPull(currentUser);
      if (cancelled || !res.ok) return;
      const base = load(currentUser);
      let changed = false;
      for (const [k, v] of Object.entries(res.sessions)) if (!base.sessions[k]) { base.sessions[k] = v; changed = true; }
      for (const [d, w] of Object.entries(res.bodyweight)) if (base.bodyweight[d] == null) { base.bodyweight[d] = w; changed = true; }
      if (!base.foodLog) base.foodLog = {};
      for (const [d, v] of Object.entries(res.foodLog || {})) if (!base.foodLog[d]) { base.foodLog[d] = v; changed = true; }
      if (res.dietTargets && !localStorage.getItem(userKey(currentUser) + "::dietTargetsTouched")) { base.dietTargets = res.dietTargets; changed = true; }
      if (changed) { save(currentUser, base); setLog(base); }
    })();
    return () => { cancelled = true; };
  }, [currentUser]);

  useEffect(() => {
    if (restTimer === null) return;
    if (restLeft <= 0) { setRestTimer(null); return; }
    const t = setTimeout(() => setRestLeft(p => p - 1), 1000);
    return () => clearTimeout(t);
  }, [restTimer, restLeft]);

  const day = DAYS[activeDay];
  const tk = todayKey();
  const sk = `${tk}-${day.id}`;
  const session = log.sessions[sk] || {};
  const omitted = session._omitted || {};
  const swapped = session._swapped || {};
  const accessoryIds = session._accessories || [];
  const customMapForRender = session._custom || {};
  const isOmitted = (exId) => !!omitted[exId];
  const getSwap = (exId) => swapped[exId] || null;

  const resolveSlot = (primary) => {
    const swapId = getSwap(primary.id);
    let slot;
    if (swapId) {
      const alt = resolveAlt(primary, swapId);
      slot = alt ? { ...alt, _swapFor: primary, _scope: "global" } : { ...primary, _scope: "day" };
    } else {
      slot = { ...primary, _scope: "day" };
    }
    return applyCustom(slot, customMapForRender);
  };

  const includedSlots = day.exercises
    .filter(ex => !isOmitted(ex.id))
    .map(resolveSlot);
  const accessorySlots = accessoryIds
    .map(id => (ACCESSORIES[day.id] || []).find(a => a.id === id))
    .filter(Boolean)
    .map(a => applyCustom({ ...a, _accessory: true, _scope: "global" }, customMapForRender));
  const renderSlots = [...includedSlots, ...accessorySlots];

  const totalSets = renderSlots.reduce((a, e) => a + e.sets, 0);
  const completedSets = renderSlots.reduce((a, ex) => a + Object.values(session[ex.id] || {}).filter(s => s.done).length, 0);
  const ended = !!session._ended;
  const sessionComplete = (completedSets === totalSets && totalSets > 0) || ended;

  // Detect transition from incomplete -> complete (per session key)
  useEffect(() => {
    const wasComplete = prevCompleteRef.current[sk];
    if (sessionComplete && wasComplete === false && !emailSent[sk]) {
      setShowEmailBanner(true);
      setChestOpen(true);
    }
    prevCompleteRef.current[sk] = sessionComplete;
  }, [sk, sessionComplete, emailSent]);

  // Auto-close chest after a few seconds
  useEffect(() => {
    if (!chestOpen) return;
    const t = setTimeout(() => setChestOpen(false), 6000);
    return () => clearTimeout(t);
  }, [chestOpen]);

  const saveToVault = useCallback(async (key, data, bw, opts = {}) => {
    const targetKey = key || sk;
    const targetData = data || session;
    const targetBw = bw !== undefined ? bw : log.bodyweight;
    if (!targetKey || !targetData || Object.keys(targetData).length === 0) return;
    if (!sb) { setSaveStatus(s => ({ ...s, [targetKey]: "error: Supabase not configured" })); return; }
    setSaveStatus(s => ({ ...s, [targetKey]: "saving" }));
    try {
      const { error } = await sb.from("sessions").upsert({
        user_id: currentUser,
        session_key: targetKey,
        data: targetData,
        updated_at: new Date().toISOString(),
      });
      if (error) throw error;
      if (targetBw && typeof targetBw === "object") {
        const rows = Object.entries(targetBw)
          .filter(([, w]) => w)
          .map(([date, weight]) => ({ user_id: currentUser, date, weight: String(weight) }));
        if (rows.length) {
          const { error: e2 } = await sb.from("bodyweight").upsert(rows);
          if (e2) throw e2;
        }
      }
      setSaveStatus(s => ({ ...s, [targetKey]: "saved" }));
      if (!opts.silent) {
        setEmailSent(prev => ({ ...prev, [targetKey]: true }));
      }
    } catch (e) {
      setSaveStatus(s => ({ ...s, [targetKey]: `error: ${e.message || "save failed"}` }));
    }
  }, [sk, session, log.bodyweight, currentUser]);

  useEffect(() => {
    if (!sessionComplete || autoSavedRef.current[sk] || Object.keys(session).length === 0) return;
    autoSavedRef.current[sk] = true;
    saveToVault(sk, session, log.bodyweight, { silent: true });
  }, [sessionComplete, sk, session, log.bodyweight, saveToVault]);

  // ---- Diet persistence: mirror a day's food log + the macro targets to Supabase ----
  const saveFoodToVault = useCallback(async (date, dayData) => {
    if (!sb || !date) return;
    try {
      await sb.from("food_log").upsert({
        user_id: currentUser, date, data: dayData, updated_at: new Date().toISOString(),
      });
    } catch (e) { console.error("food_log save", e); }
  }, [currentUser]);

  const saveDietTargets = useCallback(async (targets) => {
    try { localStorage.setItem(userKey(currentUser) + "::dietTargetsTouched", "1"); } catch {}
    if (!sb) return;
    try {
      await sb.from("diet_targets").upsert({
        user_id: currentUser, data: targets, updated_at: new Date().toISOString(),
      });
    } catch (e) { console.error("diet_targets save", e); }
  }, [currentUser]);

  // Diet state derived from the shared log
  const dietTargets = log.dietTargets || DEFAULT_DIET_TARGETS;
  const foodToday = (log.foodLog && log.foodLog[tk]) || { entries: [] };

  // Add / remove / clear food entries for a given date (default today), persisting locally + to cloud.
  const mutateFoodDay = useCallback((date, fn) => {
    persist(prev => {
      const fl = { ...(prev.foodLog || {}) };
      const day = fl[date] ? { entries: [...(fl[date].entries || [])] } : { entries: [] };
      const nextDay = fn(day);
      fl[date] = nextDay;
      saveFoodToVault(date, nextDay);
      return { ...prev, foodLog: fl };
    });
  }, [persist, saveFoodToVault]);

  const addFood = (entry) => mutateFoodDay(tk, d => ({ ...d, entries: [...d.entries, entry] }));
  const removeFood = (i) => mutateFoodDay(tk, d => ({ ...d, entries: d.entries.filter((_, idx) => idx !== i) }));
  const clearFoodDay = () => mutateFoodDay(tk, () => ({ entries: [] }));
  const setDietTargets = (targets) => { persist(prev => ({ ...prev, dietTargets: targets })); saveDietTargets(targets); };

  const logBodyweight = (val) => {
    persist(prev => {
      const bw = { ...(prev.bodyweight || {}) };
      if (val) bw[tk] = String(val); else delete bw[tk];
      return { ...prev, bodyweight: bw };
    });
    if (sb && val) { try { sb.from("bodyweight").upsert([{ user_id: currentUser, date: tk, weight: String(val) }]).then(() => {}, () => {}); } catch {} }
  };

  const updateSet = (exId, si, field, value) => {
    persist(prev => {
      const n = JSON.parse(JSON.stringify(prev));
      if (!n.sessions[sk]) n.sessions[sk] = {};
      if (!n.sessions[sk][exId]) n.sessions[sk][exId] = {};
      if (!n.sessions[sk][exId][si]) n.sessions[sk][exId][si] = {};
      n.sessions[sk][exId][si][field] = value;
      return n;
    });
  };

  const addCardio = (pos) => {
    persist(prev => {
      const n = JSON.parse(JSON.stringify(prev));
      if (!n.sessions[sk]) n.sessions[sk] = {};
      if (!n.sessions[sk]._cardio) n.sessions[sk]._cardio = {};
      if (!n.sessions[sk]._cardio[pos]) n.sessions[sk]._cardio[pos] = { modality: "Incline Walk", goal: pos === "finisher" ? "tempo" : "easy", duration: "", distance: "", rpe: "", notes: "" };
      return n;
    });
  };

  const setCardio = (pos, field, value) => {
    persist(prev => {
      const n = JSON.parse(JSON.stringify(prev));
      if (!n.sessions[sk]) n.sessions[sk] = {};
      if (!n.sessions[sk]._cardio) n.sessions[sk]._cardio = {};
      if (!n.sessions[sk]._cardio[pos]) n.sessions[sk]._cardio[pos] = {};
      n.sessions[sk]._cardio[pos][field] = value;
      return n;
    });
  };

  const removeCardio = (pos) => {
    persist(prev => {
      const n = JSON.parse(JSON.stringify(prev));
      if (n.sessions[sk]?._cardio) delete n.sessions[sk]._cardio[pos];
      return n;
    });
  };

  const markDone = (exId, si, restSec) => {
    updateSet(exId, si, "done", true);
    setActiveSet(null);
    setRestTimer(`${exId}-${si}`);
    setRestLeft(restSec);
  };

  const toggleOmit = (exId) => {
    persist(prev => {
      const n = JSON.parse(JSON.stringify(prev));
      if (!n.sessions[sk]) n.sessions[sk] = {};
      if (!n.sessions[sk]._omitted) n.sessions[sk]._omitted = {};
      if (n.sessions[sk]._omitted[exId]) {
        delete n.sessions[sk]._omitted[exId];
      } else {
        n.sessions[sk]._omitted[exId] = true;
        if (n.sessions[sk]._swapped) delete n.sessions[sk]._swapped[exId];
      }
      return n;
    });
    if (activeSet?.startsWith(`${exId}-`)) setActiveSet(null);
  };

  const setSwap = (primaryId, altId) => {
    persist(prev => {
      const n = JSON.parse(JSON.stringify(prev));
      if (!n.sessions[sk]) n.sessions[sk] = {};
      if (!n.sessions[sk]._swapped) n.sessions[sk]._swapped = {};
      n.sessions[sk]._swapped[primaryId] = altId;
      if (n.sessions[sk]._omitted) delete n.sessions[sk]._omitted[primaryId];
      return n;
    });
    setActiveSet(null);
  };

  const clearSwap = (primaryId) => {
    persist(prev => {
      const n = JSON.parse(JSON.stringify(prev));
      if (n.sessions[sk]?._swapped) delete n.sessions[sk]._swapped[primaryId];
      return n;
    });
    setActiveSet(null);
  };

  const addAccessory = (accId) => {
    persist(prev => {
      const n = JSON.parse(JSON.stringify(prev));
      if (!n.sessions[sk]) n.sessions[sk] = {};
      if (!n.sessions[sk]._accessories) n.sessions[sk]._accessories = [];
      if (!n.sessions[sk]._accessories.includes(accId)) n.sessions[sk]._accessories.push(accId);
      return n;
    });
  };

  const removeAccessory = (accId) => {
    persist(prev => {
      const n = JSON.parse(JSON.stringify(prev));
      if (n.sessions[sk]?._accessories) {
        n.sessions[sk]._accessories = n.sessions[sk]._accessories.filter(id => id !== accId);
      }
      return n;
    });
    if (activeSet?.startsWith(`${accId}-`)) setActiveSet(null);
  };

  const startSchemeEdit = (slot) => {
    setEditingScheme(slot.id);
    setDraftScheme({ sets: String(slot.sets), reps: String(slot.reps) });
  };

  const cancelSchemeEdit = () => setEditingScheme(null);

  const saveSchemeEdit = (slotId) => {
    const setsNum = parseInt(draftScheme.sets, 10);
    const repsStr = String(draftScheme.reps).trim();
    if (isNaN(setsNum) || setsNum < 1 || setsNum > 20 || !repsStr) {
      alert("Sets must be 1-20 and reps must not be blank.");
      return;
    }
    persist(prev => {
      const n = JSON.parse(JSON.stringify(prev));
      if (!n.sessions[sk]) n.sessions[sk] = {};
      if (!n.sessions[sk]._custom) n.sessions[sk]._custom = {};
      n.sessions[sk]._custom[slotId] = { sets: setsNum, reps: repsStr };
      return n;
    });
    setEditingScheme(null);
  };

  const clearSchemeCustom = (slotId) => {
    persist(prev => {
      const n = JSON.parse(JSON.stringify(prev));
      if (n.sessions[sk]?._custom) {
        delete n.sessions[sk]._custom[slotId];
      }
      return n;
    });
    setEditingScheme(null);
  };

  const getLast = (exId, scope = "day") => {
    const keys = Object.keys(log.sessions)
      .filter(k => k !== sk)
      .filter(k => scope === "day" ? k.endsWith(`-${day.id}`) : true)
      .sort().reverse();
    for (const k of keys) {
      const data = log.sessions[k]?.[exId];
      if (data && Object.keys(data).some(s => /^\d+$/.test(s))) {
        return { date: k.slice(0,10), data };
      }
    }
    return null;
  };

  const getHistory = (exId, scope = "day") =>
    Object.keys(log.sessions)
      .filter(k => scope === "day" ? k.endsWith(`-${day.id}`) : true)
      .filter(k => log.sessions[k]?.[exId] && Object.keys(log.sessions[k][exId]).some(s => /^\d+$/.test(s)))
      .sort().reverse()
      .map(k => ({ date: k.slice(0,10), data: log.sessions[k][exId] }));

  // Trend series for the inline mini-chart: prior sessions (excludes today),
  // metric = estimated 1RM (falls back to reps for bodyweight moves).
  const getTrend = (exId, scope = "day") => {
    const pts = [];
    for (const k of Object.keys(log.sessions).sort()) {
      if (k === sk) continue;
      if (scope === "day" && !k.endsWith(`-${day.id}`)) continue;
      const data = log.sessions[k]?.[exId];
      if (!data || !Object.keys(data).some(s => /^\d+$/.test(s))) continue;
      const e1 = computeMetric(data, "e1rm");
      const val = e1 > 0 ? e1 : computeMetric(data, "reps");
      if (val > 0) pts.push({ date: k.slice(0, 10), value: val });
    }
    return pts;
  };

  const renderMiniTrend = (series) => {
    if (series.length < 2) return null;
    const n = series.length;
    const mean = series.reduce((a, d) => a + d.value, 0) / n;
    const mx = (n - 1) / 2;
    let num = 0, den = 0;
    for (let i = 0; i < n; i++) { num += (i - mx) * (series[i].value - mean); den += (i - mx) * (i - mx); }
    const slope = den ? num / den : 0;          // metric units per session
    const flat = mean * 0.003;                  // deadzone so tiny drift reads as "flat"
    const color = slope > flat ? "#4ade80" : slope < -flat ? "#E0A85A" : "#777";
    const icon = slope > flat ? "↗" : slope < -flat ? "↘" : "→";
    const label = slope > flat ? "improving" : slope < -flat ? "slipping" : "flat";
    const net = Math.round(slope * (n - 1));   // fitted change over the window — sign matches the label
    const w = 64, h = 20;
    const vals = series.map(d => d.value);
    const min = Math.min(...vals), max = Math.max(...vals);
    const range = max - min || 1;
    const pts = series.map((d, i) => `${((i / (n - 1)) * w).toFixed(1)},${(h - 2 - ((d.value - min) / range) * (h - 4)).toFixed(1)}`);
    return (
      <div style={{ padding: "0 14px 8px", display: "flex", alignItems: "center", gap: 8 }}>
        <svg width={w} height={h} viewBox={`0 0 ${w} ${h}`} style={{ display: "block", flexShrink: 0 }}>
          <polyline points={pts.join(" ")} fill="none" stroke={color} strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" />
        </svg>
        <span style={{ fontSize: 10, color, fontFamily: "monospace" }}>{icon} {label}{label !== "flat" && net !== 0 ? ` (${net > 0 ? "+" : ""}${net})` : ""} · {n}</span>
      </div>
    );
  };

  const clearToday = () => {
    if (!confirm(`Clear today's logged sets for ${day.name}?`)) return;
    persist(prev => { const n = JSON.parse(JSON.stringify(prev)); delete n.sessions[sk]; return n; });
    setShowEmailBanner(false);
    setEmailSent(prev => { const n = { ...prev }; delete n[sk]; return n; });
    setActiveSet(null);
    setRestTimer(null); setRestLeft(0);
  };

  const clearAllData = async () => {
    if (!confirm(`Delete ALL workout history and bodyweight data for "${currentUser}" — both on this device and in the cloud? This cannot be undone.`)) return;
    if (!confirm("Are you absolutely sure? Everything will be erased.")) return;
    localStorage.removeItem(userKey(currentUser));
    if (sb) {
      try {
        await sb.from("sessions").delete().eq("user_id", currentUser);
        await sb.from("bodyweight").delete().eq("user_id", currentUser);
      } catch (e) { console.error("cloud clear failed", e); }
    }
    setLog({ sessions: {}, bodyweight: {} });
    setShowEmailBanner(false);
    setEmailSent({});
    setActiveSet(null);
    setRestTimer(null); setRestLeft(0);
    setHistoryView(null);
  };

  const endWorkout = () => {
    const primariesToOmit = [];
    const accessoriesToRemove = [];
    for (const primary of day.exercises) {
      if (isOmitted(primary.id)) continue;
      const swapId = getSwap(primary.id);
      const slotId = swapId || primary.id;
      const doneCount = Object.values(session[slotId] || {}).filter(s => s.done).length;
      if (doneCount === 0) primariesToOmit.push(primary.id);
    }
    for (const accId of accessoryIds) {
      const doneCount = Object.values(session[accId] || {}).filter(s => s.done).length;
      if (doneCount === 0) accessoriesToRemove.push(accId);
    }
    const dropCount = primariesToOmit.length + accessoriesToRemove.length;
    const msg = dropCount > 0
      ? `End workout? ${dropCount} exercise${dropCount > 1 ? "s" : ""} with no logged sets will be dropped from the report. Partial sets will be kept.`
      : "End workout? Any unfinished sets will be skipped in the report.";
    if (!confirm(msg)) return;
    persist(prev => {
      const n = JSON.parse(JSON.stringify(prev));
      if (!n.sessions[sk]) n.sessions[sk] = {};
      if (!n.sessions[sk]._omitted) n.sessions[sk]._omitted = {};
      for (const id of primariesToOmit) {
        n.sessions[sk]._omitted[id] = true;
        if (n.sessions[sk]._swapped) delete n.sessions[sk]._swapped[id];
      }
      if (n.sessions[sk]._accessories) {
        n.sessions[sk]._accessories = n.sessions[sk]._accessories.filter(id => !accessoriesToRemove.includes(id));
      }
      n.sessions[sk]._ended = true;
      return n;
    });
    setActiveSet(null);
    setRestTimer(null); setRestLeft(0);
    setShowEmailBanner(true);
  };

  const sessionHasData = Object.keys(session).length > 0;

  // ── Tab routing: Today / Eat render here; Train falls through to the views below ──
  if (activeTab === "eat") return (<>
    <EatView targets={dietTargets} foodToday={foodToday} onAdd={addFood} onRemove={removeFood} onClear={clearFoodDay} onSetTargets={setDietTargets} />
    <BottomTabs active="eat" onChange={setActiveTab} />
  </>);
  if (activeTab === "today") return (<>
    <TodayView log={log} tk={tk} targets={dietTargets} foodToday={foodToday} currentUser={currentUser} onLogWeight={logBodyweight} onGoTrain={() => setActiveTab("train")} onGoEat={() => setActiveTab("eat")} />
    <BottomTabs active="today" onChange={setActiveTab} />
  </>);

  // Overview view (cross-exercise + bodyweight)
  if (overviewView) {
    const openExerciseHistory = (exId, meta) => {
      if (meta?.dayIndex != null) setActiveDay(meta.dayIndex);
      setHistoryView(exId);
      setShowAllHistory(false);
      setOverviewView(false);
    };

    // Bodyweight series (chronological)
    const bwDates = Object.keys(log.bodyweight || {}).sort();
    const bwData = bwDates
      .map(d => ({ date: d, value: parseFloat(log.bodyweight[d]) || 0 }))
      .filter(d => d.value > 0);

    const periodDelta = (data, days) => {
      if (data.length < 2) return null;
      const cutoff = Date.now() - days * 86400 * 1000;
      const older = data.filter(d => new Date(d.date).getTime() <= cutoff);
      if (older.length === 0) return null;
      const old = older[older.length - 1].value;
      const current = data[data.length - 1].value;
      return computeDelta(current, old);
    };

    const bwSummary = bwData.length > 0 ? {
      current: bwData[bwData.length - 1].value,
      currentDate: bwData[bwData.length - 1].date,
      d30: periodDelta(bwData, 30),
      d90: periodDelta(bwData, 90),
      allTime: bwData.length >= 2 ? computeDelta(bwData[bwData.length - 1].value, bwData[0].value) : null,
      pr: bwData.reduce((a, b) => b.value > a.value ? b : a, bwData[0]),
      lo: bwData.reduce((a, b) => b.value < a.value ? b : a, bwData[0]),
    } : null;

    // Per-exercise data summaries
    const buildSeries = (exId, scope, dayId) => {
      const points = [];
      for (const sKey of Object.keys(log.sessions).sort()) {
        if (scope === "day" && !sKey.endsWith(`-${dayId}`)) continue;
        const data = log.sessions[sKey]?.[exId];
        if (!data) continue;
        if (!Object.keys(data).some(k => /^\d+$/.test(k))) continue;
        // pick weight-based metric if any weight present, else reps
        const maxW = computeMetric(data, "top");
        const val = maxW > 0 ? maxW : computeMetric(data, "reps");
        if (val > 0) points.push({ date: sKey.slice(0,10), value: val, isWeight: maxW > 0 });
      }
      return points;
    };

    // Gather all exercise ids that have at least one logged set
    const allIds = new Set();
    for (const sKey in log.sessions) {
      const s = log.sessions[sKey];
      if (!s) continue;
      for (const id of Object.keys(s)) {
        if (id.startsWith("_")) continue;
        const v = s[id];
        if (typeof v !== "object" || v === null) continue;
        if (Object.keys(v).some(k => /^\d+$/.test(k))) allIds.add(id);
      }
    }

    // Group: primaries by day, "other" for alts/accessories
    const dayGroups = DAYS.map(d => ({
      day: d,
      rows: d.exercises
        .filter(ex => allIds.has(ex.id))
        .map(ex => {
          const series = buildSeries(ex.id, "day", d.id);
          return { id: ex.id, name: ex.name, meta: { dayIndex: DAYS.indexOf(d) }, color: d.color, series };
        })
        .filter(r => r.series.length > 0),
    })).filter(g => g.rows.length > 0);

    const primaryIdSet = new Set(DAYS.flatMap(d => d.exercises.map(e => e.id)));
    const otherIds = [...allIds].filter(id => !primaryIdSet.has(id));
    const otherRows = otherIds.map(id => {
      const meta = findExerciseMeta(id);
      const series = buildSeries(id, "global");
      return { id, name: meta.name, meta, color: "#666", series };
    }).filter(r => r.series.length > 0)
      .sort((a, b) => a.name.localeCompare(b.name));

    // ── Cardio analytics ──
    const cardioEntries = [];
    for (const sKey of Object.keys(log.sessions).sort()) {
      const c = log.sessions[sKey]?._cardio;
      if (!c) continue;
      for (const pos of ["starter", "finisher"]) {
        const e = c[pos];
        if (!e) continue;
        const dur = parseFloat(e.duration) || 0;
        if (dur <= 0) continue;
        cardioEntries.push({
          date: sKey.slice(0, 10), modality: e.modality || "Other",
          duration: dur, distance: parseFloat(e.distance) || 0, rpe: parseFloat(e.rpe) || 0,
        });
      }
    }
    const cardioSummary = cardioEntries.length ? (() => {
      const totalMin = cardioEntries.reduce((a, e) => a + e.duration, 0);
      const totalDist = cardioEntries.reduce((a, e) => a + e.distance, 0);
      const rpes = cardioEntries.filter(e => e.rpe > 0).map(e => e.rpe);
      const avgRpe = rpes.length ? rpes.reduce((a, b) => a + b, 0) / rpes.length : 0;
      const t0 = new Date(cardioEntries[0].date).getTime();
      const wk = {};
      for (const e of cardioEntries) {
        const b = Math.floor((new Date(e.date).getTime() - t0) / (7 * 86400000));
        wk[b] = (wk[b] || 0) + e.duration;
      }
      const weekSeries = Object.keys(wk).map(Number).sort((a, b) => a - b)
        .map(b => ({ date: new Date(t0 + b * 7 * 86400000).toISOString().slice(0, 10), value: Math.round(wk[b]) }));
      const byMod = {};
      for (const e of cardioEntries) {
        if (e.distance > 0 && e.duration > 0) (byMod[e.modality] = byMod[e.modality] || []).push({ date: e.date, value: e.duration / e.distance });
      }
      const paceRows = Object.keys(byMod).filter(m => byMod[m].length >= 2).map(m => ({ modality: m, series: byMod[m] }))
        .sort((a, b) => b.series.length - a.series.length);
      return { sessions: cardioEntries.length, totalMin, totalDist, avgRpe, weekSeries, paceRows };
    })() : null;

    const fmtPace = (p) => `${Math.floor(p)}:${String(Math.round((p - Math.floor(p)) * 60)).padStart(2, "0")}`;
    const classifyPace = (series) => {
      const n = series.length;
      const mean = series.reduce((a, d) => a + d.value, 0) / n;
      const mx = (n - 1) / 2;
      let num = 0, den = 0;
      for (let i = 0; i < n; i++) { num += (i - mx) * (series[i].value - mean); den += (i - mx) * (i - mx); }
      const slope = den ? num / den : 0, flat = mean * 0.003;
      if (slope < -flat) return { label: "improving", color: "#4ade80" };  // lower pace = faster
      if (slope > flat) return { label: "slipping", color: "#E0A85A" };
      return { label: "flat", color: "#777" };
    };

    const renderSparkline = (series, color) => {
      if (series.length < 2) return null;
      const w = 80, h = 22;
      const values = series.map(d => d.value);
      const max = Math.max(...values);
      const min = Math.min(...values);
      const range = max - min || 1;
      const pts = series.map((d, i) => {
        const x = (i / (series.length - 1)) * w;
        const y = h - 2 - ((d.value - min) / range) * (h - 4);
        return `${x.toFixed(1)},${y.toFixed(1)}`;
      });
      return (
        <svg width={w} height={h} viewBox={`0 0 ${w} ${h}`} style={{ display: "block" }}>
          <polyline points={pts.join(" ")} fill="none" stroke={color} strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" />
        </svg>
      );
    };

    const renderBigChart = (series, color) => {
      if (series.length < 2) return null;
      const w = 400, h = 160, padL = 44, padR = 12, padT = 14, padB = 28;
      const innerW = w - padL - padR;
      const innerH = h - padT - padB;
      const values = series.map(d => d.value);
      const maxV = Math.max(...values);
      const minV = Math.min(...values);
      const span = maxV - minV;
      const pad = span * 0.15 || Math.max(1, maxV * 0.05);
      const step = maxV > 200 ? 5 : maxV > 50 ? 2 : 1;
      const yMin = Math.max(0, Math.floor((minV - pad) / step) * step);
      const yMax = Math.ceil((maxV + pad) / step) * step;
      const yRange = yMax - yMin || 1;
      const xScale = (i) => series.length <= 1 ? padL + innerW / 2 : padL + (i / (series.length - 1)) * innerW;
      const yScale = (v) => padT + innerH - ((v - yMin) / yRange) * innerH;
      const points = series.map((d, i) => ({ x: xScale(i), y: yScale(d.value), value: d.value, date: d.date }));
      const path = points.map((p, i) => `${i === 0 ? "M" : "L"} ${p.x.toFixed(1)} ${p.y.toFixed(1)}`).join(" ");
      const gridYs = [yMin, Math.round((yMin + yMax) / 2), yMax];
      const dotR = series.length > 40 ? 0 : series.length > 20 ? 2 : 3;
      const xLabelIdxs = series.length >= 3 ? [0, Math.floor(series.length / 2), series.length - 1] : [0, series.length - 1];
      return (
        <svg width="100%" height={h} viewBox={`0 0 ${w} ${h}`} style={{ display: "block" }} preserveAspectRatio="xMidYMid meet">
          {gridYs.map(gy => (
            <g key={gy}>
              <line x1={padL} y1={yScale(gy)} x2={padL + innerW} y2={yScale(gy)} stroke="#1F1F1F" strokeWidth="1" />
              <text x={padL - 6} y={yScale(gy) + 3} fontSize="10" fill="#666" textAnchor="end" fontFamily="monospace">{gy.toLocaleString()}</text>
            </g>
          ))}
          <path d={path} fill="none" stroke={color} strokeWidth="2" strokeLinejoin="round" strokeLinecap="round" />
          {dotR > 0 && points.map((p, i) => (
            <circle key={i} cx={p.x} cy={p.y} r={dotR} fill={color} stroke="#0F0F0F" strokeWidth="1.5" />
          ))}
          {xLabelIdxs.map((idx, i) => {
            const p = points[idx];
            if (!p) return null;
            const anchor = i === 0 ? "start" : i === xLabelIdxs.length - 1 ? "end" : "middle";
            return <text key={idx} x={p.x} y={h - 8} fontSize="9" fill="#666" textAnchor={anchor} fontFamily="monospace">{p.date.slice(5)}</text>;
          })}
        </svg>
      );
    };

    const renderRow = (row) => {
      const last = row.series[row.series.length - 1];
      const first = row.series[0];
      const d30 = periodDelta(row.series, 30);
      const unit = row.series.every(s => !s.isWeight) ? "reps" : "lb";
      const delta = d30 ?? (row.series.length >= 2 ? computeDelta(last.value, first.value) : null);
      const deltaColor = !delta ? "#555" : delta.delta > 0 ? "#4ade80" : delta.delta < 0 ? "#f87171" : "#888";
      return (
        <button key={row.id} onClick={() => openExerciseHistory(row.id, row.meta)} style={{
          width: "100%", padding: "10px 12px", background: "#151515", border: "1px solid #222", borderRadius: 8,
          marginBottom: 4, cursor: "pointer", display: "flex", alignItems: "center", gap: 10, textAlign: "left",
        }}>
          <div style={{ flex: 1, minWidth: 0 }}>
            <div style={{ fontSize: 13, fontWeight: 600, color: "#E8E8E8", overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{row.name}</div>
            <div style={{ fontSize: 10, color: "#666", fontFamily: "monospace", marginTop: 2 }}>{row.series.length} session{row.series.length === 1 ? "" : "s"}</div>
          </div>
          {renderSparkline(row.series, row.color)}
          <div style={{ textAlign: "right", fontFamily: "monospace", minWidth: 64 }}>
            <div style={{ fontSize: 14, fontWeight: 700, color: "#E8E8E8" }}>{last.value.toLocaleString()}<span style={{ fontSize: 9, color: "#555", marginLeft: 2 }}>{unit}</span></div>
            <div style={{ fontSize: 10, color: deltaColor }}>{delta ? `${delta.delta > 0 ? "+" : ""}${Math.round(delta.delta)} (${delta.pct > 0 ? "+" : ""}${delta.pct.toFixed(1)}%)` : "—"}</div>
          </div>
        </button>
      );
    };

    return (
      <div style={{ maxWidth: 480, margin: "0 auto", padding: "16px 16px 80px" }}>
        <button onClick={() => setOverviewView(false)} style={{ background: "none", border: "none", color: "#888", fontSize: 14, cursor: "pointer", padding: "8px 0" }}>← Back</button>
        <h2 style={{ margin: "12px 0 16px", fontSize: 20, fontWeight: 700 }}>Overview</h2>

        {/* Bodyweight */}
        <div style={{ fontSize: 10, color: "#666", letterSpacing: 1, fontFamily: "monospace", marginBottom: 8 }}>BODYWEIGHT</div>
        {!bwSummary && (
          <div style={{ background: "#151515", border: "1px solid #222", borderRadius: 10, padding: "16px", marginBottom: 20, color: "#666", fontSize: 13, textAlign: "center" }}>No bodyweight logged yet.</div>
        )}
        {bwSummary && (
          <div style={{ marginBottom: 24 }}>
            <div style={{ display: "flex", gap: 6, marginBottom: 6 }}>
              <div style={{ flex: 1, background: "#151515", border: "1px solid #222", borderRadius: 8, padding: "10px 12px" }}>
                <div style={{ fontSize: 9, color: "#666", letterSpacing: 1, fontFamily: "monospace" }}>CURRENT</div>
                <div style={{ fontSize: 18, color: "#E8E8E8", fontWeight: 700, fontFamily: "monospace", marginTop: 2 }}>{bwSummary.current.toFixed(1)}<span style={{ fontSize: 10, color: "#555", marginLeft: 3 }}>lb</span></div>
                <div style={{ fontSize: 10, color: "#555", fontFamily: "monospace" }}>{bwSummary.currentDate}</div>
              </div>
              <div style={{ flex: 1, background: "#151515", border: "1px solid #222", borderRadius: 8, padding: "10px 12px" }}>
                <div style={{ fontSize: 9, color: "#666", letterSpacing: 1, fontFamily: "monospace" }}>RANGE</div>
                <div style={{ fontSize: 13, color: "#E8E8E8", fontWeight: 700, fontFamily: "monospace", marginTop: 4 }}>{bwSummary.lo.value.toFixed(1)} – {bwSummary.pr.value.toFixed(1)}</div>
              </div>
            </div>
            <div style={{ display: "flex", gap: 6, marginBottom: 12 }}>
              {[{ label: "30d", d: bwSummary.d30 }, { label: "90d", d: bwSummary.d90 }, { label: "all", d: bwSummary.allTime }].map(({ label, d }) => (
                <div key={label} style={{ flex: 1, background: "#0E0E0E", border: "1px solid " + (d ? "#1F1F1F" : "#1A1A1A"), borderRadius: 8, padding: "8px 10px" }}>
                  <div style={{ fontSize: 9, color: "#666", letterSpacing: 1, fontFamily: "monospace" }}>Δ {label}</div>
                  <div style={{ fontSize: 13, color: !d ? "#444" : (d.delta < 0 ? "#4ade80" : d.delta > 0 ? "#f87171" : "#888"), fontFamily: "monospace", fontWeight: 700, marginTop: 2 }}>
                    {!d ? "—" : `${d.delta > 0 ? "+" : ""}${d.delta.toFixed(1)}`}
                  </div>
                  <div style={{ fontSize: 10, color: "#555", fontFamily: "monospace" }}>{!d ? "" : `${d.pct > 0 ? "+" : ""}${d.pct.toFixed(1)}%`}</div>
                </div>
              ))}
            </div>
            <div style={{ background: "#0E0E0E", border: "1px solid #1F1F1F", borderRadius: 10, padding: "10px 6px 6px" }}>
              {bwData.length >= 2 ? renderBigChart(bwData, "#9AC8FF") : (
                <div style={{ height: 100, display: "flex", alignItems: "center", justifyContent: "center", color: "#555", fontSize: 12 }}>Log at least 2 bodyweight entries to chart.</div>
              )}
            </div>
          </div>
        )}

        {/* Cardio */}
        <div style={{ fontSize: 10, color: "#666", letterSpacing: 1, fontFamily: "monospace", marginBottom: 8 }}>CARDIO</div>
        {!cardioSummary && (
          <div style={{ background: "#151515", border: "1px solid #222", borderRadius: 10, padding: "16px", marginBottom: 24, color: "#666", fontSize: 13, textAlign: "center" }}>No cardio logged yet.</div>
        )}
        {cardioSummary && (
          <div style={{ marginBottom: 24 }}>
            <div style={{ display: "flex", gap: 6, marginBottom: 12 }}>
              {[
                { label: "SESSIONS", val: cardioSummary.sessions },
                { label: "TOTAL MIN", val: Math.round(cardioSummary.totalMin).toLocaleString() },
                { label: "DISTANCE", val: cardioSummary.totalDist > 0 ? `${cardioSummary.totalDist.toFixed(1)}mi` : "—" },
                { label: "AVG RPE", val: cardioSummary.avgRpe > 0 ? cardioSummary.avgRpe.toFixed(1) : "—" },
              ].map(s => (
                <div key={s.label} style={{ flex: 1, background: "#151515", border: "1px solid #222", borderRadius: 8, padding: "10px 8px" }}>
                  <div style={{ fontSize: 8, color: "#666", letterSpacing: 1, fontFamily: "monospace" }}>{s.label}</div>
                  <div style={{ fontSize: 15, color: "#E8E8E8", fontWeight: 700, fontFamily: "monospace", marginTop: 3 }}>{s.val}</div>
                </div>
              ))}
            </div>
            <div style={{ fontSize: 9, color: "#666", letterSpacing: 1, fontFamily: "monospace", marginBottom: 6 }}>WEEKLY MINUTES</div>
            <div style={{ background: "#0E0E0E", border: "1px solid #1F1F1F", borderRadius: 10, padding: "10px 6px 6px", marginBottom: 12 }}>
              {cardioSummary.weekSeries.length >= 2 ? renderBigChart(cardioSummary.weekSeries, "#3AAFA9") : (
                <div style={{ height: 100, display: "flex", alignItems: "center", justifyContent: "center", color: "#555", fontSize: 12 }}>Log cardio across 2+ weeks to chart volume.</div>
              )}
            </div>
            {cardioSummary.paceRows.length > 0 && (
              <div>
                <div style={{ fontSize: 9, color: "#666", letterSpacing: 1, fontFamily: "monospace", marginBottom: 6 }}>PACE BY ACTIVITY · lower = faster</div>
                {cardioSummary.paceRows.map(row => {
                  const last = row.series[row.series.length - 1].value;
                  const t = classifyPace(row.series);
                  return (
                    <div key={row.modality} style={{ width: "100%", padding: "10px 12px", background: "#151515", border: "1px solid #222", borderRadius: 8, marginBottom: 4, display: "flex", alignItems: "center", gap: 10 }}>
                      <div style={{ flex: 1, minWidth: 0 }}>
                        <div style={{ fontSize: 13, fontWeight: 600, color: "#E8E8E8" }}>{row.modality}</div>
                        <div style={{ fontSize: 10, color: t.color, fontFamily: "monospace", marginTop: 2 }}>{t.label} · {row.series.length}</div>
                      </div>
                      {renderSparkline(row.series, t.color)}
                      <div style={{ textAlign: "right", fontFamily: "monospace", minWidth: 60 }}>
                        <div style={{ fontSize: 14, fontWeight: 700, color: "#E8E8E8" }}>{fmtPace(last)}<span style={{ fontSize: 9, color: "#555", marginLeft: 2 }}>/mi</span></div>
                      </div>
                    </div>
                  );
                })}
              </div>
            )}
          </div>
        )}

        {/* Exercises */}
        <div style={{ fontSize: 10, color: "#666", letterSpacing: 1, fontFamily: "monospace", marginBottom: 8 }}>EXERCISES</div>
        {dayGroups.length === 0 && otherRows.length === 0 && (
          <div style={{ background: "#151515", border: "1px solid #222", borderRadius: 10, padding: 16, color: "#666", fontSize: 13, textAlign: "center" }}>No logged sets yet. Complete a workout to populate this.</div>
        )}
        {dayGroups.map(g => (
          <div key={g.day.id} style={{ marginBottom: 14 }}>
            <div style={{ fontSize: 11, color: g.day.color, letterSpacing: 1.5, fontFamily: "monospace", marginBottom: 6, textTransform: "uppercase" }}>{g.day.name} · {g.day.subtitle}</div>
            {g.rows.map(renderRow)}
          </div>
        ))}
        {otherRows.length > 0 && (
          <div style={{ marginBottom: 14 }}>
            <div style={{ fontSize: 11, color: "#888", letterSpacing: 1.5, fontFamily: "monospace", marginBottom: 6, textTransform: "uppercase" }}>Substitutes &amp; accessories</div>
            {otherRows.map(renderRow)}
          </div>
        )}
      </div>
    );
  }

  // History view
  if (historyView) {
    let ex = day.exercises.find(e => e.id === historyView);
    let scope = "day";
    if (!ex) {
      for (const p of day.exercises) {
        const alt = p.alts?.find(a => a.id === historyView);
        if (alt) { ex = resolveAlt(p, historyView); scope = "global"; break; }
      }
    }
    if (!ex) {
      const acc = (ACCESSORIES[day.id] || []).find(a => a.id === historyView);
      if (acc) { ex = acc; scope = "global"; }
    }
    const hist = getHistory(historyView, scope);

    const computeMetric = (sessionData, metric) => {
      const setKeys = Object.keys(sessionData).filter(s => /^\d+$/.test(s));
      if (setKeys.length === 0) return 0;
      if (metric === "top") {
        return Math.max(...setKeys.map(si => parseFloat(sessionData[si].weight) || 0));
      }
      if (metric === "volume") {
        return setKeys.reduce((sum, si) => {
          const w = parseFloat(sessionData[si].weight) || 0;
          const r = parseInt(sessionData[si].reps) || 0;
          return sum + w * r;
        }, 0);
      }
      if (metric === "e1rm") {
        let max = 0;
        for (const si of setKeys) {
          const w = parseFloat(sessionData[si].weight) || 0;
          const r = parseInt(sessionData[si].reps) || 0;
          if (w === 0 || r === 0) continue;
          const e1rm = r === 1 ? w : w * (1 + r / 30);
          if (e1rm > max) max = e1rm;
        }
        return Math.round(max);
      }
      if (metric === "reps") {
        return Math.max(...setKeys.map(si => parseInt(sessionData[si].reps) || 0));
      }
      return 0;
    };

    const METRICS = [
      { id: "top", label: "Top Wt" },
      { id: "volume", label: "Volume" },
      { id: "e1rm", label: "e1RM" },
      { id: "reps", label: "Top Reps" },
    ];

    // chronological (oldest -> newest) for the chart
    const chrono = [...hist].reverse();
    const chartData = chrono.map(h => ({ date: h.date, value: computeMetric(h.data, historyMetric) }));
    const nonZero = chartData.filter(d => d.value > 0);

    const renderChart = () => {
      if (nonZero.length < 2) return null;
      const w = 400, h = 180, padL = 44, padR = 12, padT = 14, padB = 28;
      const innerW = w - padL - padR;
      const innerH = h - padT - padB;
      const values = chartData.map(d => d.value);
      const maxV = Math.max(...values);
      const minV = Math.min(...values.filter(v => v > 0));
      const span = maxV - minV;
      const pad = span * 0.15 || Math.max(1, maxV * 0.1);
      const step = maxV > 200 ? 25 : maxV > 50 ? 10 : 5;
      const yMin = Math.max(0, Math.floor((minV - pad) / step) * step);
      const yMax = Math.ceil((maxV + pad) / step) * step;
      const yRange = yMax - yMin || 1;
      const xScale = (i) => chartData.length <= 1 ? padL + innerW / 2 : padL + (i / (chartData.length - 1)) * innerW;
      const yScale = (v) => padT + innerH - ((v - yMin) / yRange) * innerH;
      const points = chartData.map((d, i) => ({ x: xScale(i), y: yScale(d.value), value: d.value, date: d.date }));
      // path only across points with value > 0
      const pathSegments = [];
      let inSeg = false;
      points.forEach((p, i) => {
        if (p.value > 0) {
          pathSegments.push(`${inSeg ? "L" : "M"} ${p.x.toFixed(1)} ${p.y.toFixed(1)}`);
          inSeg = true;
        } else { inSeg = false; }
      });
      const path = pathSegments.join(" ");
      const gridYs = [yMin, Math.round((yMin + yMax) / 2), yMax];
      const xLabelIdxs = chartData.length >= 3 ? [0, Math.floor(chartData.length / 2), chartData.length - 1] : [0, chartData.length - 1];
      const dotR = chartData.length > 60 ? 0 : chartData.length > 30 ? 2 : 3.5;
      return (
        <svg width="100%" height={h} viewBox={`0 0 ${w} ${h}`} style={{ display: "block" }} preserveAspectRatio="xMidYMid meet">
          {gridYs.map(gy => (
            <g key={gy}>
              <line x1={padL} y1={yScale(gy)} x2={padL + innerW} y2={yScale(gy)} stroke="#1F1F1F" strokeWidth="1" />
              <text x={padL - 6} y={yScale(gy) + 3} fontSize="10" fill="#666" textAnchor="end" fontFamily="monospace">{gy.toLocaleString()}</text>
            </g>
          ))}
          <path d={path} fill="none" stroke={day.color} strokeWidth="2" strokeLinejoin="round" strokeLinecap="round" />
          {dotR > 0 && points.filter(p => p.value > 0).map((p, i) => (
            <circle key={i} cx={p.x} cy={p.y} r={dotR} fill={day.color} stroke="#0F0F0F" strokeWidth="1.5" />
          ))}
          {xLabelIdxs.map((idx, i) => {
            const p = points[idx];
            if (!p) return null;
            const anchor = i === 0 ? "start" : i === xLabelIdxs.length - 1 ? "end" : "middle";
            return <text key={idx} x={p.x} y={h - 8} fontSize="9" fill="#666" textAnchor={anchor} fontFamily="monospace">{p.date.slice(5)}</text>;
          })}
        </svg>
      );
    };

    // Period-based summary stats for the selected metric
    const summaryStats = (() => {
      if (chartData.length === 0) return null;
      const nz = chartData.filter(d => d.value > 0);
      if (nz.length === 0) return null;
      let prValue = 0, prDate = null;
      for (const d of nz) {
        if (d.value > prValue) { prValue = d.value; prDate = d.date; }
      }
      const current = nz[nz.length - 1].value;
      const currentDate = nz[nz.length - 1].date;
      const todayMs = Date.now();
      const changeOver = (days) => {
        const cutoff = todayMs - days * 86400 * 1000;
        const older = nz.filter(d => new Date(d.date).getTime() <= cutoff);
        if (older.length === 0) return null;
        const old = older[older.length - 1].value;
        if (old === 0) return null;
        return { delta: current - old, pct: ((current - old) / old) * 100, fromDate: older[older.length - 1].date };
      };
      const allTime = nz[0].value > 0
        ? { delta: current - nz[0].value, pct: ((current - nz[0].value) / nz[0].value) * 100, fromDate: nz[0].date }
        : null;
      return { pr: { value: prValue, date: prDate }, current, currentDate, d30: changeOver(30), d90: changeOver(90), allTime, spanDays: nz.length >= 2 ? Math.round((todayMs - new Date(nz[0].date).getTime()) / 86400000) : 0 };
    })();

    const DETAIL_LIMIT = 15;
    const visibleHist = showAllHistory ? hist : hist.slice(0, DETAIL_LIMIT);
    const renderDelta = (d, label) => {
      if (!d) return (
        <div style={{ flex: "1 1 80px", background: "#0E0E0E", border: "1px solid #1A1A1A", borderRadius: 8, padding: "8px 10px" }}>
          <div style={{ fontSize: 9, color: "#444", letterSpacing: 1, fontFamily: "monospace" }}>Δ {label}</div>
          <div style={{ fontSize: 13, color: "#444", fontFamily: "monospace", marginTop: 2 }}>—</div>
        </div>
      );
      const up = d.delta > 0, down = d.delta < 0;
      const color = up ? "#4ade80" : down ? "#f87171" : "#888";
      return (
        <div style={{ flex: "1 1 80px", background: "#0E0E0E", border: "1px solid #1F1F1F", borderRadius: 8, padding: "8px 10px" }}>
          <div style={{ fontSize: 9, color: "#666", letterSpacing: 1, fontFamily: "monospace" }}>Δ {label}</div>
          <div style={{ fontSize: 13, color, fontFamily: "monospace", marginTop: 2, fontWeight: 700 }}>
            {up ? "+" : ""}{Math.round(d.delta).toLocaleString()}
          </div>
          <div style={{ fontSize: 10, color: "#555", fontFamily: "monospace" }}>{up ? "+" : ""}{d.pct.toFixed(1)}%</div>
        </div>
      );
    };

    return (
      <div style={{ maxWidth: 480, margin: "0 auto", padding: 16 }}>
        <button onClick={() => { setHistoryView(null); setShowAllHistory(false); }} style={{ background: "none", border: "none", color: "#888", fontSize: 14, cursor: "pointer", padding: "8px 0" }}>← Back</button>
        <div style={{ display: "flex", alignItems: "center", gap: 8, margin: "12px 0 4px" }}>
          <h2 style={{ fontSize: 20, fontWeight: 700, margin: 0 }}>{ex?.name}</h2>
          {ex?.name && <a href={getGuideUrl(ex.name)} target="_blank" rel="noopener noreferrer" title="Video guide" style={{ ...guideLinkStyle, width: 22, height: 22, fontSize: 11 }}>?</a>}
        </div>
        <p style={{ color: "#666", fontSize: 13, margin: "0 0 16px" }}>{hist.length} session{hist.length === 1 ? "" : "s"}{summaryStats?.spanDays ? ` · ${summaryStats.spanDays} days` : ""}{scope === "global" ? " · all days" : ""}</p>

        {hist.length === 0 && <p style={{ color: "#555", fontSize: 14 }}>No history yet.</p>}

        {hist.length > 0 && (
          <>
            {/* Metric toggle */}
            <div style={{ display: "flex", gap: 4, marginBottom: 10 }}>
              {METRICS.map(m => (
                <button key={m.id} onClick={() => setHistoryMetric(m.id)} style={{
                  flex: 1, padding: "8px 4px",
                  background: historyMetric === m.id ? `${day.color}25` : "#1A1A1A",
                  border: `1px solid ${historyMetric === m.id ? day.color : "#2A2A2A"}`,
                  borderRadius: 6, color: historyMetric === m.id ? "#E8E8E8" : "#888",
                  fontSize: 11, fontFamily: "monospace", cursor: "pointer", letterSpacing: 1,
                }}>{m.label}</button>
              ))}
            </div>

            {/* Summary stats */}
            {summaryStats && (
              <div style={{ marginBottom: 12 }}>
                <div style={{ display: "flex", gap: 6, marginBottom: 6 }}>
                  <div style={{ flex: 1, background: "#151515", border: "1px solid #222", borderRadius: 8, padding: "10px 12px" }}>
                    <div style={{ fontSize: 9, color: "#666", letterSpacing: 1, fontFamily: "monospace" }}>CURRENT</div>
                    <div style={{ fontSize: 18, color: "#E8E8E8", fontWeight: 700, fontFamily: "monospace", marginTop: 2 }}>{summaryStats.current.toLocaleString()}</div>
                    <div style={{ fontSize: 10, color: "#555", fontFamily: "monospace" }}>{summaryStats.currentDate}</div>
                  </div>
                  <div style={{ flex: 1, background: "#151515", border: `1px solid ${day.color}40`, borderRadius: 8, padding: "10px 12px" }}>
                    <div style={{ fontSize: 9, color: "#666", letterSpacing: 1, fontFamily: "monospace" }}>PR</div>
                    <div style={{ fontSize: 18, color: day.color, fontWeight: 700, fontFamily: "monospace", marginTop: 2 }}>{summaryStats.pr.value.toLocaleString()}</div>
                    <div style={{ fontSize: 10, color: "#555", fontFamily: "monospace" }}>{summaryStats.pr.date}</div>
                  </div>
                </div>
                <div style={{ display: "flex", gap: 6 }}>
                  {renderDelta(summaryStats.d30, "30d")}
                  {renderDelta(summaryStats.d90, "90d")}
                  {renderDelta(summaryStats.allTime, "all")}
                </div>
              </div>
            )}

            {/* Chart */}
            <div style={{ background: "#0E0E0E", border: "1px solid #1F1F1F", borderRadius: 10, padding: "10px 6px 6px", marginBottom: 16 }}>
              {nonZero.length >= 2 ? renderChart() : (
                <div style={{ height: 140, display: "flex", alignItems: "center", justifyContent: "center", color: "#555", fontSize: 12 }}>
                  Need at least 2 sessions with data to chart.
                </div>
              )}
            </div>

            {/* Session table */}
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline", marginBottom: 6 }}>
              <div style={{ fontSize: 10, color: "#666", letterSpacing: 1, fontFamily: "monospace" }}>RECENT SESSIONS</div>
              <div style={{ fontSize: 10, color: "#555", fontFamily: "monospace" }}>
                {showAllHistory || hist.length <= DETAIL_LIMIT ? `${hist.length} of ${hist.length}` : `${DETAIL_LIMIT} of ${hist.length}`}
              </div>
            </div>
            {visibleHist.map((h, i) => {
              const top = computeMetric(h.data, "top");
              const vol = computeMetric(h.data, "volume");
              const e1rm = computeMetric(h.data, "e1rm");
              const setKeys = Object.keys(h.data).filter(s => /^\d+$/.test(s)).sort((a,b)=>a-b);
              return (
                <div key={i} style={{ background: "#151515", borderRadius: 10, border: "1px solid #222", padding: "10px 12px", marginBottom: 6 }}>
                  <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 8, gap: 8, flexWrap: "wrap" }}>
                    <div style={{ fontSize: 12, color: "#888", fontFamily: "monospace" }}>{h.date}</div>
                    <div style={{ display: "flex", gap: 10, fontFamily: "monospace", fontSize: 11 }}>
                      {top > 0 && <span><span style={{ color: "#555" }}>top </span><span style={{ color: "#E8E8E8", fontWeight: 700 }}>{top}</span></span>}
                      {vol > 0 && <span><span style={{ color: "#555" }}>vol </span><span style={{ color: "#E8E8E8", fontWeight: 700 }}>{vol.toLocaleString()}</span></span>}
                      {e1rm > 0 && <span><span style={{ color: "#555" }}>e1RM </span><span style={{ color: day.color, fontWeight: 700 }}>{e1rm}</span></span>}
                    </div>
                  </div>
                  <div style={{ display: "flex", gap: 6, flexWrap: "wrap" }}>
                    {setKeys.map(si => {
                      const s = h.data[si];
                      return <div key={si} style={{ background: "#1F1F1F", borderRadius: 6, padding: "5px 9px", fontSize: 12, fontFamily: "monospace" }}>
                        <span style={{ color: "#666" }}>S{parseInt(si)+1}</span>{" "}
                        <span style={{ color: "#E8E8E8", fontWeight: 600 }}>{s.weight||"—"}</span>
                        <span style={{ color: "#555" }}>×</span>
                        <span style={{ color: "#E8E8E8" }}>{s.reps||"—"}</span>
                      </div>;
                    })}
                  </div>
                </div>
              );
            })}
            {hist.length > DETAIL_LIMIT && (
              <button onClick={() => setShowAllHistory(s => !s)} style={{ width: "100%", padding: 10, background: "transparent", border: "1px dashed #333", borderRadius: 8, color: "#888", fontSize: 12, cursor: "pointer", marginTop: 4 }}>
                {showAllHistory ? `Collapse to ${DETAIL_LIMIT} most recent` : `Show all ${hist.length} sessions`}
              </button>
            )}
          </>
        )}
      </div>
    );
  }

  // Chest overlay (Vampire-Survivors-style burst on session completion)
  const renderChest = () => {
    if (!chestOpen) return null;
    let vol = 0, doneSets = 0;
    for (const slot of renderSlots) {
      const exData = session[slot.id];
      if (!exData) continue;
      for (const k of Object.keys(exData)) {
        if (!/^\d+$/.test(k)) continue;
        const sd = exData[k];
        if (!sd?.done) continue;
        doneSets++;
        const w = parseFloat(sd.weight) || 0;
        const r = parseInt(sd.reps) || 0;
        vol += w * r;
      }
    }
    const particles = Array.from({ length: 36 }, (_, i) => {
      const angle = (i / 36) * Math.PI * 2 + Math.random() * 0.25;
      const dist = 180 + Math.random() * 180;
      const size = 4 + Math.random() * 9;
      return {
        tx: Math.cos(angle) * dist,
        ty: Math.sin(angle) * dist,
        size,
        delay: Math.random() * 0.35,
        duration: 1.4 + Math.random() * 0.8,
      };
    });
    return (
      <div className="chest-overlay" onClick={() => setChestOpen(false)}>
        <div className="chest-beams" />
        <div className="chest-flash" />
        {particles.map((p, i) => (
          <div key={i} className="chest-particle" style={{
            "--tx": `${p.tx}px`,
            "--ty": `${p.ty}px`,
            width: `${p.size}px`,
            height: `${p.size}px`,
            animationDelay: `${p.delay}s`,
            animationDuration: `${p.duration}s`,
          }} />
        ))}
        <div className="chest-content">
          <div className="chest-title">COMPLETE!</div>
          <div className="chest-stat" style={{ animationDelay: "0.75s" }}>
            SETS<span className="chest-stat-value">{doneSets}</span>
          </div>
          <div className="chest-stat" style={{ animationDelay: "0.95s" }}>
            VOLUME<span className="chest-stat-value">{Math.round(vol).toLocaleString()} lb</span>
          </div>
          <div className="chest-stat" style={{ animationDelay: "1.15s" }}>
            {day.name.toUpperCase()}<span className="chest-stat-value">{day.subtitle}</span>
          </div>
        </div>
        <div className="chest-hint">tap to continue</div>
      </div>
    );
  };

  return (<>
    <div style={{ maxWidth: 480, margin: "0 auto", padding: "16px 16px 120px" }}>
      {renderChest()}
      {/* Header */}
      <div style={{ marginBottom: 20, display: "flex", justifyContent: "space-between", alignItems: "flex-start" }}>
        <div>
          <div style={{ fontSize: 10, letterSpacing: 3, textTransform: "uppercase", color: "#555", fontFamily: "monospace" }}>{fmtDate(new Date())}</div>
          <h1 style={{ margin: "4px 0 0", fontSize: 24, fontWeight: 700 }}>Train</h1>
        </div>
        <div style={{ display: "flex", gap: 6, alignItems: "center", flexWrap: "wrap", justifyContent: "flex-end" }}>
          {USERS.length > 1 && (
            <select
              value={currentUser}
              onChange={e => setCurrentUser(e.target.value)}
              title="Switch user"
              style={{ background: "#1A1A1A", border: "1px solid #3A3A2A", color: "#CB8", borderRadius: 6, padding: "6px 8px", fontSize: 11, cursor: "pointer", fontFamily: "inherit", textTransform: "capitalize" }}
            >
              {USERS.map(u => <option key={u} value={u}>{u}</option>)}
            </select>
          )}
          <button onClick={() => setOverviewView(true)} title="Cross-exercise history and bodyweight trends" style={{ background: "#1A1A1A", border: "1px solid #2A2A3A", color: "#9AC", borderRadius: 6, padding: "6px 10px", fontSize: 11, cursor: "pointer" }}>Overview</button>
          <button onClick={clearAllData} title="Clear all data for this user (device + cloud)" style={{ background: "#1A1A1A", border: "1px solid #3A2525", color: "#A66", borderRadius: 6, padding: "6px 10px", fontSize: 11, cursor: "pointer" }}>Clear All</button>
        </div>
      </div>

      {/* Backend not configured warning */}
      {!sb && (
        <div style={{ background: "#2A1E0E", border: "1px solid #5A4A2A", borderRadius: 8, padding: "8px 12px", marginBottom: 12, fontSize: 12, color: "#DCB", fontFamily: "monospace" }}>
          Cloud sync disabled — set SUPABASE_URL and SUPABASE_ANON_KEY in index.html. Data is saved on this device only.
        </div>
      )}

      {/* Session Complete Banner */}
      {(showEmailBanner || (sessionComplete && !emailSent[sk])) && (() => {
        const status = saveStatus[sk];
        const saving = status === "saving";
        const saved = status === "saved";
        const errored = typeof status === "string" && status.startsWith("error");
        return (
          <div className="email-banner">
            <div style={{ fontSize: 16, fontWeight: 700, color: "#4ade80", marginBottom: 6 }}>Session Complete! 💪</div>
            <div style={{ fontSize: 13, color: "#999", marginBottom: 14 }}>
              {saving ? "Saving to cloud…" : saved ? "Saved to cloud ✓" : errored ? "Save failed — tap to retry." : "Saving your workout to the cloud."}
            </div>
            <button onClick={() => saveToVault(sk, session, log.bodyweight)} disabled={saving} style={{ width: "100%", padding: "12px", background: saved ? "#1F3A28" : "#4ade80", border: "none", borderRadius: 8, color: saved ? "#8DC" : "#0F0F0F", fontSize: 14, fontWeight: 700, cursor: saving ? "default" : "pointer", opacity: saving ? 0.7 : 1 }}>
              {saving ? "Saving…" : saved ? "Saved ✓ — save again" : errored ? "Retry save" : "Save to cloud"}
            </button>
            {errored && <div style={{ fontSize: 11, color: "#F88", marginTop: 6, fontFamily: "monospace" }}>{status.replace("error: ", "")}</div>}
            <button onClick={() => { setShowEmailBanner(false); setEmailSent(prev => ({...prev, [sk]: true})); }} style={{ background: "none", border: "none", color: "#555", fontSize: 11, cursor: "pointer", marginTop: 10, textDecoration: "underline", width: "100%" }}>Dismiss</button>
          </div>
        );
      })()}

      {/* Manual save button when banner dismissed */}
      {sessionComplete && emailSent[sk] && (
        <div style={{ display: "flex", gap: 8, marginBottom: 16, alignItems: "center" }}>
          <button onClick={() => saveToVault(sk, session, log.bodyweight)} style={{ flex: 1, padding: "10px", background: "#1A1A1A", border: "1px solid #333", borderRadius: 8, color: "#888", fontSize: 12, cursor: "pointer" }}>
            {saveStatus[sk] === "saving" ? "Saving…" : saveStatus[sk] === "saved" ? "Saved ✓ — save again" : "Save to cloud"}
          </button>
        </div>
      )}

      {/* Bodyweight */}
      {(() => {
        const bw = log.bodyweight?.[tk] || "";
        const bwDates = Object.keys(log.bodyweight || {}).filter(d => d !== tk).sort().reverse();
        const lastBW = bwDates.length > 0 ? log.bodyweight[bwDates[0]] : null;
        const diff = bw && lastBW ? (parseFloat(bw) - parseFloat(lastBW)).toFixed(1) : null;
        return (
          <div style={{ background: "#151515", border: "1px solid #222", borderRadius: 12, padding: "12px 14px", marginBottom: 16, display: "flex", alignItems: "center", gap: 12 }}>
            <div style={{ flex: 1 }}>
              <div style={{ fontSize: 11, color: "#666", marginBottom: 4 }}>Bodyweight today</div>
              <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
