const resolveAlt = (primary, altId) => {
  const alt = primary.alts?.find(a => a.id === altId);
  if (!alt) return null;
  return {
    id: alt.id,
    name: alt.name,
    sets: alt.sets ?? primary.sets,
    reps: alt.reps ?? primary.reps,
    rest: alt.rest ?? primary.rest,
  };
};

const SK = "workout-log-v1";
const USER_EMAIL = "kalinowski89@gmail.com";
const load = () => { try { const d = JSON.parse(localStorage.getItem(SK)) || {}; if (!d.sessions) d.sessions = {}; if (!d.bodyweight) d.bodyweight = {}; return d; } catch { return { sessions: {}, bodyweight: {} }; } };
const save = (d) => { try { localStorage.setItem(SK, JSON.stringify(d)); } catch(e) { console.error(e); } };

const fmtDate = (d) => d.toLocaleDateString("en-US", { weekday: "short", month: "short", day: "numeric" });
const todayKey = () => { const d = new Date(); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`; };
const parseRest = (s) => { const m = s.match(/(\d+)/); if (!m) return 120; const n = parseInt(m[1]); return s.includes("min") ? n * 60 : n; };

function buildWorkoutEmail(day, session, log, tk) {
  const lines = [];
  lines.push("WORKOUT LOG");
  lines.push("Date: " + tk);
  lines.push("Program: 3-Day Full Body Strength (Intermediate)");
  lines.push("Session: " + day.name + " - " + day.subtitle);
  lines.push("");
  lines.push("--- EXERCISES ---");
  lines.push("");

  const omitted = session._omitted || {};
  const swapped = session._swapped || {};
  const accessoryIds = session._accessories || [];
  const ended = !!session._ended;

  const omittedExercises = day.exercises.filter(ex => omitted[ex.id] && !swapped[ex.id]);
  const includedSlots = day.exercises.map(p => {
    if (omitted[p.id]) return null;
    if (swapped[p.id]) {
      const alt = resolveAlt(p, swapped[p.id]);
      if (alt) return { ...alt, _swapFor: p.name, _scope: "global" };
      return { ...p, _scope: "day" };
    }
    return { ...p, _scope: "day" };
  }).filter(Boolean);

  const accessorySlots = accessoryIds
    .map(id => (ACCESSORIES[day.id] || []).find(a => a.id === id))
    .filter(Boolean)
    .map(a => ({ ...a, _accessory: true, _scope: "global" }));

  const allSlots = [...includedSlots, ...accessorySlots];

  allSlots.forEach((ex) => {
    const exData = session[ex.id] || {};
    const label = ex._swapFor ? `${ex.name} (in place of ${ex._swapFor})` : (ex._accessory ? `${ex.name} (accessory)` : ex.name);
    lines.push(label + " (Target: " + ex.sets + " x " + ex.reps + ")");

    // Current session sets
    const setLines = [];
    for (let i = 0; i < ex.sets; i++) {
      const sd = exData[i];
      if (sd && sd.done) {
        setLines.push("  Set " + (i+1) + ": " + (sd.weight || "BW") + " lb x " + (sd.reps || "?") + " reps");
      } else if (!ended) {
        setLines.push("  Set " + (i+1) + ": skipped");
      }
    }
    lines.push(...setLines);

    // Previous session comparison: day-scoped for primaries, global for alts/accessories
    const prevKeys = Object.keys(log.sessions)
      .filter(k => k !== `${tk}-${day.id}`)
      .filter(k => ex._scope === "day" ? k.endsWith(`-${day.id}`) : true)
      .sort().reverse();
    for (const k of prevKeys) {
      if (log.sessions[k]?.[ex.id]) {
        const prev = log.sessions[k][ex.id];
        const prevSets = Object.keys(prev).filter(s => /^\d+$/.test(s)).sort((a,b)=>a-b)
          .map(si => (prev[si].weight||"?") + "x" + (prev[si].reps||"?")).join(", ");
        if (prevSets) {
          lines.push("  Previous (" + k.slice(0,10) + "): " + prevSets);
          break;
        }
      }
    }
    lines.push("");
  });

  // Volume summary
  lines.push("--- VOLUME SUMMARY ---");
  let totalWeight = 0;
  let totalReps = 0;
  let totalSetsCompleted = 0;
  allSlots.forEach(ex => {
    const exData = session[ex.id] || {};
    for (let i = 0; i < ex.sets; i++) {
      const sd = exData[i];
      if (sd && sd.done) {
        totalSetsCompleted++;
        const w = parseFloat(sd.weight) || 0;
        const r = parseInt(sd.reps) || 0;
        totalReps += r;
        totalWeight += w * r;
      }
    }
  });
  lines.push("Sets completed: " + totalSetsCompleted + "/" + allSlots.reduce((a,e) => a + e.sets, 0));
  lines.push("Total reps: " + totalReps);
  lines.push("Total volume: " + totalWeight.toLocaleString() + " lb");
  if (omittedExercises.length > 0) {
    lines.push("Omitted: " + omittedExercises.map(e => e.name).join(", "));
  }
  lines.push("");

  // Bodyweight
  const todayBW = log.bodyweight?.[tk];
  if (todayBW) {
    lines.push("--- BODYWEIGHT ---");
    lines.push("Today: " + todayBW + " lb");
    const bwDates = Object.keys(log.bodyweight).filter(d => d !== tk).sort().reverse();
    if (bwDates.length > 0) {
      lines.push("Previous (" + bwDates[0] + "): " + log.bodyweight[bwDates[0]] + " lb");
      const diff = (parseFloat(todayBW) - parseFloat(log.bodyweight[bwDates[0]])).toFixed(1);
      lines.push("Change: " + (diff > 0 ? "+" : "") + diff + " lb");
    }
    if (bwDates.length >= 6) {
      const oldest = bwDates[bwDates.length - 1];
      const totalDiff = (parseFloat(todayBW) - parseFloat(log.bodyweight[oldest])).toFixed(1);
      lines.push("Since " + oldest + ": " + (totalDiff > 0 ? "+" : "") + totalDiff + " lb");
    }
    lines.push("");
  }

  lines.push("--- PASTE INTO CLAUDE FOR FEEDBACK ---");
  lines.push("Ask: Review my workout log above. Flag any exercises where I should increase or decrease weight next session. Note any volume or rep range issues." + (todayBW ? " Also comment on my bodyweight trend and whether my rate of loss is healthy given my training." : "") + " Suggest what to focus on for my next " + day.name + " session.");

  return lines.join("\n");
}

function App() {
  const [activeDay, setActiveDay] = useState(0);
  const [log, setLog] = useState(load);
  const [activeSet, setActiveSet] = useState(null);
  const [historyView, setHistoryView] = useState(null);
  const [restTimer, setRestTimer] = useState(null);
  const [restLeft, setRestLeft] = useState(0);
  const [showEmailBanner, setShowEmailBanner] = useState(false);
  const [emailSent, setEmailSent] = useState({});
  const [swapPickerFor, setSwapPickerFor] = useState(null);
  const [showAccessoryPicker, setShowAccessoryPicker] = useState(false);
  const prevCompleted = useRef(0);

  const persist = useCallback((fn) => {
    setLog(prev => {
      const next = typeof fn === 'function' ? fn(prev) : fn;
      save(next);
      return next;
    });
  }, []);

  useEffect(() => {
    if (restTimer === null) return;
    if (restLeft <= 0) { setRestTimer(null); return; }
    const t = setTimeout(() => setRestLeft(p => p - 1), 1000);
    return () => clearTimeout(t);
  }, [restTimer, restLeft]);

  const day = DAYS[activeDay];
  const tk = todayKey();
  const sk = `${tk}-${day.id}`;
  const session = log.sessions[sk] || {};
  const omitted = session._omitted || {};
  const swapped = session._swapped || {};
  const accessoryIds = session._accessories || [];
  const isOmitted = (exId) => !!omitted[exId];
  const getSwap = (exId) => swapped[exId] || null;

  const resolveSlot = (primary) => {
    const swapId = getSwap(primary.id);
    if (swapId) {
      const alt = resolveAlt(primary, swapId);
      if (alt) return { ...alt, _swapFor: primary, _scope: "day" };
    }
    return { ...primary, _scope: "day" };
  };

  const includedSlots = day.exercises
    .filter(ex => !isOmitted(ex.id))
    .map(resolveSlot);
  const accessorySlots = accessoryIds
    .map(id => (ACCESSORIES[day.id] || []).find(a => a.id === id))
    .filter(Boolean)
    .map(a => ({ ...a, _accessory: true, _scope: "global" }));
  const renderSlots = [...includedSlots, ...accessorySlots];

  const totalSets = renderSlots.reduce((a, e) => a + e.sets, 0);
  const completedSets = renderSlots.reduce((a, ex) => a + Object.values(session[ex.id] || {}).filter(s => s.done).length, 0);
  const ended = !!session._ended;
  const sessionComplete = (completedSets === totalSets && totalSets > 0) || ended;

  // Detect session completion
  useEffect(() => {
    if (sessionComplete && prevCompleted.current < totalSets && !emailSent[sk]) {
      setShowEmailBanner(true);
    }
    prevCompleted.current = completedSets;
  }, [completedSets, sessionComplete]);

  const openEmailDraft = () => {
    const body = buildWorkoutEmail(day, session, log, tk);
    const subject = "Workout Log - " + day.name + " " + day.subtitle + " - " + tk;
    const to = USER_EMAIL;
    window.location.href = "mailto:" + encodeURIComponent(to) + "?subject=" + encodeURIComponent(subject) + "&body=" + encodeURIComponent(body);
    setEmailSent(prev => ({ ...prev, [sk]: true }));
    setShowEmailBanner(false);
  };

  const copyToClipboard = () => {
    const body = buildWorkoutEmail(day, session, log, tk);
    navigator.clipboard.writeText(body).then(() => {
      setEmailSent(prev => ({ ...prev, [sk]: true }));
      setShowEmailBanner(false);
      alert("Workout log copied to clipboard!");
    }).catch(() => {
      // Fallback
      const ta = document.createElement("textarea");
      ta.value = body;
      document.body.appendChild(ta);
      ta.select();
      document.execCommand("copy");
      document.body.removeChild(ta);
      setEmailSent(prev => ({ ...prev, [sk]: true }));
      setShowEmailBanner(false);
      alert("Workout log copied to clipboard!");
    });
  };

  const updateSet = (exId, si, field, value) => {
    persist(prev => {
      const n = JSON.parse(JSON.stringify(prev));
      if (!n.sessions[sk]) n.sessions[sk] = {};
      if (!n.sessions[sk][exId]) n.sessions[sk][exId] = {};
      if (!n.sessions[sk][exId][si]) n.sessions[sk][exId][si] = {};
      n.sessions[sk][exId][si][field] = value;
      return n;
    });
  };

  const markDone = (exId, si, restSec) => {
    updateSet(exId, si, "done", true);
    setActiveSet(null);
    setRestTimer(`${exId}-${si}`);
    setRestLeft(restSec);
  };

  const toggleOmit = (exId) => {
    persist(prev => {
      const n = JSON.parse(JSON.stringify(prev));
      if (!n.sessions[sk]) n.sessions[sk] = {};
      if (!n.sessions[sk]._omitted) n.sessions[sk]._omitted = {};
      if (n.sessions[sk]._omitted[exId]) {
        delete n.sessions[sk]._omitted[exId];
      } else {
        n.sessions[sk]._omitted[exId] = true;
        if (n.sessions[sk]._swapped) delete n.sessions[sk]._swapped[exId];
      }
      return n;
    });
    if (activeSet?.startsWith(`${exId}-`)) setActiveSet(null);
  };

  const setSwap = (primaryId, altId) => {
    persist(prev => {
      const n = JSON.parse(JSON.stringify(prev));
      if (!n.sessions[sk]) n.sessions[sk] = {};
      if (!n.sessions[sk]._swapped) n.sessions[sk]._swapped = {};
      n.sessions[sk]._swapped[primaryId] = altId;
      if (n.sessions[sk]._omitted) delete n.sessions[sk]._omitted[primaryId];
      return n;
    });
    setActiveSet(null);
  };

  const clearSwap = (primaryId) => {
    persist(prev => {
      const n = JSON.parse(JSON.stringify(prev));
      if (n.sessions[sk]?._swapped) delete n.sessions[sk]._swapped[primaryId];
      return n;
    });
    setActiveSet(null);
  };

  const addAccessory = (accId) => {
    persist(prev => {
      const n = JSON.parse(JSON.stringify(prev));
      if (!n.sessions[sk]) n.sessions[sk] = {};
      if (!n.sessions[sk]._accessories) n.sessions[sk]._accessories = [];
      if (!n.sessions[sk]._accessories.includes(accId)) n.sessions[sk]._accessories.push(accId);
      return n;
    });
  };

  const removeAccessory = (accId) => {
    persist(prev => {
      const n = JSON.parse(JSON.stringify(prev));
      if (n.sessions[sk]?._accessories) {
        n.sessions[sk]._accessories = n.sessions[sk]._accessories.filter(id => id !== accId);
      }
      return n;
    });
    if (activeSet?.startsWith(`${accId}-`)) setActiveSet(null);
  };

  const getLast = (exId, scope = "day") => {
    const keys = Object.keys(log.sessions)
      .filter(k => k !== sk)
      .filter(k => scope === "day" ? k.endsWith(`-${day.id}`) : true)
      .sort().reverse();
    for (const k of keys) {
      const data = log.sessions[k]?.[exId];
      if (data && Object.keys(data).some(s => /^\d+$/.test(s))) {
        return { date: k.slice(0,10), data };
      }
    }
    return null;
  };

  const getHistory = (exId, scope = "day") =>
    Object.keys(log.sessions)
      .filter(k => scope === "day" ? k.endsWith(`-${day.id}`) : true)
      .filter(k => log.sessions[k]?.[exId] && Object.keys(log.sessions[k][exId]).some(s => /^\d+$/.test(s)))
      .sort().reverse().slice(0, 10)
      .map(k => ({ date: k.slice(0,10), data: log.sessions[k][exId] }));

  const clearToday = () => {
    if (!confirm(`Clear today's logged sets for ${day.name}?`)) return;
    persist(prev => { const n = JSON.parse(JSON.stringify(prev)); delete n.sessions[sk]; return n; });
    setShowEmailBanner(false);
    setEmailSent(prev => { const n = { ...prev }; delete n[sk]; return n; });
    setActiveSet(null);
    setRestTimer(null); setRestLeft(0);
  };

  const clearAllData = () => {
    if (!confirm("Delete ALL workout history and bodyweight data from this device? This cannot be undone.")) return;
    if (!confirm("Are you absolutely sure? Everything will be erased.")) return;
    localStorage.removeItem(SK);
    setLog({ sessions: {}, bodyweight: {} });
    setShowEmailBanner(false);
    setEmailSent({});
    setActiveSet(null);
    setRestTimer(null); setRestLeft(0);
    setHistoryView(null);
  };

  const endWorkout = () => {
    const primariesToOmit = [];
    const accessoriesToRemove = [];
    for (const primary of day.exercises) {
      if (isOmitted(primary.id)) continue;
      const swapId = getSwap(primary.id);
      const slotId = swapId || primary.id;
      const doneCount = Object.values(session[slotId] || {}).filter(s => s.done).length;
      if (doneCount === 0) primariesToOmit.push(primary.id);
    }
    for (const accId of accessoryIds) {
      const doneCount = Object.values(session[accId] || {}).filter(s => s.done).length;
      if (doneCount === 0) accessoriesToRemove.push(accId);
    }
    const dropCount = primariesToOmit.length + accessoriesToRemove.length;
    const msg = dropCount > 0
      ? `End workout? ${dropCount} exercise${dropCount > 1 ? "s" : ""} with no logged sets will be dropped from the report. Partial sets will be kept.`
      : "End workout? Any unfinished sets will be skipped in the report.";
    if (!confirm(msg)) return;
    persist(prev => {
      const n = JSON.parse(JSON.stringify(prev));
      if (!n.sessions[sk]) n.sessions[sk] = {};
      if (!n.sessions[sk]._omitted) n.sessions[sk]._omitted = {};
      for (const id of primariesToOmit) {
        n.sessions[sk]._omitted[id] = true;
        if (n.sessions[sk]._swapped) delete n.sessions[sk]._swapped[id];
      }
      if (n.sessions[sk]._accessories) {
        n.sessions[sk]._accessories = n.sessions[sk]._accessories.filter(id => !accessoriesToRemove.includes(id));
      }
      n.sessions[sk]._ended = true;
      return n;
    });
    setActiveSet(null);
    setRestTimer(null); setRestLeft(0);
    setShowEmailBanner(true);
  };

  const exportData = () => {
    const blob = new Blob([JSON.stringify(log, null, 2)], { type: "application/json" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a"); a.href = url; a.download = `workout-log-${tk}.json`; a.click();
    URL.revokeObjectURL(url);
  };

  const sessionHasData = Object.keys(session).length > 0;

  // History view
  if (historyView) {
    let ex = day.exercises.find(e => e.id === historyView);
    let scope = "day";
    if (!ex) {
      for (const p of day.exercises) {
        const alt = p.alts?.find(a => a.id === historyView);
        if (alt) { ex = resolveAlt(p, historyView); scope = "global"; break; }
      }
    }
    if (!ex) {
      const acc = (ACCESSORIES[day.id] || []).find(a => a.id === historyView);
      if (acc) { ex = acc; scope = "global"; }
    }
    const hist = getHistory(historyView, scope);
    return (
      <div style={{ maxWidth: 480, margin: "0 auto", padding: 16 }}>
        <button onClick={() => setHistoryView(null)} style={{ background: "none", border: "none", color: "#888", fontSize: 14, cursor: "pointer", padding: "8px 0" }}>← Back</button>
        <h2 style={{ margin: "12px 0 4px", fontSize: 20, fontWeight: 700 }}>{ex?.name}</h2>
        <p style={{ color: "#666", fontSize: 13, margin: "0 0 20px" }}>Last {hist.length} sessions</p>
        {hist.length === 0 && <p style={{ color: "#555", fontSize: 14 }}>No history yet.</p>}
        {hist.map((h, i) => (
          <div key={i} style={{ background: "#181818", borderRadius: 10, border: "1px solid #252525", padding: "12px 14px", marginBottom: 8 }}>
            <div style={{ fontSize: 12, color: "#666", fontFamily: "monospace", marginBottom: 8 }}>{h.date}</div>
            <div style={{ display: "flex", gap: 6, flexWrap: "wrap" }}>
              {Object.keys(h.data).sort((a,b)=>a-b).map(si => {
                const s = h.data[si];
                return <div key={si} style={{ background: "#222", borderRadius: 6, padding: "6px 10px", fontSize: 13 }}>
                  <span style={{ color: "#999" }}>S{parseInt(si)+1}</span>{" "}
                  <span style={{ color: "#E8E8E8", fontWeight: 600 }}>{s.weight||"—"}</span>
                  <span style={{ color: "#666" }}> lb × </span>
                  <span style={{ color: "#E8E8E8" }}>{s.reps||"—"}</span>
                </div>;
              })}
            </div>
          </div>
        ))}
      </div>
    );
  }

  return (
    <div style={{ maxWidth: 480, margin: "0 auto", padding: "16px 16px 120px" }}>
      {/* Header */}
      <div style={{ marginBottom: 20, display: "flex", justifyContent: "space-between", alignItems: "flex-start" }}>
        <div>
          <div style={{ fontSize: 10, letterSpacing: 3, textTransform: "uppercase", color: "#555", fontFamily: "monospace" }}>{fmtDate(new Date())}</div>
          <h1 style={{ margin: "4px 0 0", fontSize: 24, fontWeight: 700 }}>Strength Tracker</h1>
        </div>
        <div style={{ display: "flex", gap: 6 }}>
          <button onClick={exportData} style={{ background: "#1A1A1A", border: "1px solid #333", color: "#888", borderRadius: 6, padding: "6px 10px", fontSize: 11, cursor: "pointer" }}>Export</button>
          <button onClick={clearAllData} title="Clear all data" style={{ background: "#1A1A1A", border: "1px solid #3A2525", color: "#A66", borderRadius: 6, padding: "6px 10px", fontSize: 11, cursor: "pointer" }}>Clear All</button>
        </div>
      </div>

      {/* Session Complete Banner */}
      {(showEmailBanner || (sessionComplete && !emailSent[sk])) && (
        <div className="email-banner">
          <div style={{ fontSize: 16, fontWeight: 700, color: "#4ade80", marginBottom: 6 }}>Session Complete! 💪</div>
          <div style={{ fontSize: 13, color: "#999", marginBottom: 14 }}>Send yourself a workout summary to paste into Claude for feedback.</div>
          <div style={{ display: "flex", gap: 8 }}>
            <button onClick={openEmailDraft} style={{ flex: 1, padding: "12px", background: "#4ade80", border: "none", borderRadius: 8, color: "#0F0F0F", fontSize: 14, fontWeight: 700, cursor: "pointer" }}>
              Email Summary
            </button>
            <button onClick={copyToClipboard} style={{ padding: "12px 16px", background: "#333", border: "none", borderRadius: 8, color: "#CCC", fontSize: 13, cursor: "pointer" }}>
              Copy
            </button>
          </div>
          <button onClick={() => { setShowEmailBanner(false); setEmailSent(prev => ({...prev, [sk]: true})); }} style={{ background: "none", border: "none", color: "#555", fontSize: 11, cursor: "pointer", marginTop: 10, textDecoration: "underline", width: "100%" }}>Dismiss</button>
        </div>
      )}

      {/* Manual email button when session is done and banner dismissed */}
      {sessionComplete && emailSent[sk] && (
        <div style={{ display: "flex", gap: 8, marginBottom: 16 }}>
          <button onClick={openEmailDraft} style={{ flex: 1, padding: "10px", background: "#1A1A1A", border: "1px solid #333", borderRadius: 8, color: "#888", fontSize: 12, cursor: "pointer" }}>📧 Re-send Summary</button>
          <button onClick={copyToClipboard} style={{ padding: "10px 14px", background: "#1A1A1A", border: "1px solid #333", borderRadius: 8, color: "#888", fontSize: 12, cursor: "pointer" }}>📋 Copy</button>
        </div>
      )}

      {/* Bodyweight */}
      {(() => {
        const bw = log.bodyweight?.[tk] || "";
        const bwDates = Object.keys(log.bodyweight || {}).filter(d => d !== tk).sort().reverse();
        const lastBW = bwDates.length > 0 ? log.bodyweight[bwDates[0]] : null;
        const diff = bw && lastBW ? (parseFloat(bw) - parseFloat(lastBW)).toFixed(1) : null;
        return (
          <div style={{ background: "#151515", border: "1px solid #222", borderRadius: 12, padding: "12px 14px", marginBottom: 16, display: "flex", alignItems: "center", gap: 12 }}>
            <div style={{ flex: 1 }}>
              <div style={{ fontSize: 11, color: "#666", marginBottom: 4 }}>Bodyweight today</div>
              <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                <input
                  type="number"
                  inputMode="decimal"
                  value={bw}
                  onChange={e => persist(prev => { const n = JSON.parse(JSON.stringify(prev)); if (!n.bodyweight) n.bodyweight = {}; n.bodyweight[tk] = e.target.value; return n; })}
                  placeholder={lastBW || "lbs"}
                  style={{ width: 90, padding: "8px 10px", background: "#1A1A1A", border: "1px solid #333", borderRadius: 8, color: "#E8E8E8", fontSize: 16, fontWeight: 700, fontFamily: "monospace", outline: "none", boxSizing: "border-box" }}
                />
                <span style={{ fontSize: 13, color: "#555" }}>lb</span>
                {diff !== null && diff !== "0.0" && (
                  <span style={{ fontSize: 12, fontWeight: 600, fontFamily: "monospace", color: parseFloat(diff) < 0 ? "#4ade80" : "#f87171" }}>
                    {parseFloat(diff) > 0 ? "+" : ""}{diff}
                  </span>
                )}
              </div>
            </div>
            {lastBW && <div style={{ textAlign: "right" }}>
              <div style={{ fontSize: 10, color: "#555" }}>Last</div>
              <div style={{ fontSize: 14, color: "#888", fontFamily: "monospace", fontWeight: 600 }}>{lastBW}</div>
            </div>}
          </div>
        );
      })()}

      {/* Day Tabs */}
      <div style={{ display: "flex", gap: 6, marginBottom: 16 }}>
        {DAYS.map((d, i) => (
          <button key={i} onClick={() => { setActiveDay(i); setActiveSet(null); }} style={{
            flex: 1, padding: "10px 6px", border: activeDay===i ? `2px solid ${d.color}` : "2px solid #222",
            borderRadius: 10, background: activeDay===i ? `${d.color}18` : "#151515", cursor: "pointer",
          }}>
            <div style={{ fontSize: 10, letterSpacing: 1.5, textTransform: "uppercase", color: activeDay===i ? d.color : "#555", fontFamily: "monospace" }}>{d.name}</div>
            <div style={{ fontSize: 12, color: activeDay===i ? "#CCC" : "#666", marginTop: 2 }}>{d.subtitle}</div>
          </button>
        ))}
      </div>

      {/* Progress */}
      <div style={{ marginBottom: 20 }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", fontSize: 12, color: "#666", marginBottom: 4 }}>
          <span>{completedSets}/{totalSets} sets{ended ? " · ended" : (sessionComplete && totalSets > 0 ? " · complete" : "")}</span>
          <div style={{ display: "flex", gap: 14, alignItems: "center" }}>
            {sessionHasData && !sessionComplete && (
              <button onClick={endWorkout} style={{ background: "none", border: "none", color: day.color, fontSize: 11, cursor: "pointer", textDecoration: "underline", fontWeight: 600 }}>End workout</button>
            )}
            {sessionHasData && (
              <button onClick={clearToday} style={{ background: "none", border: "none", color: "#888", fontSize: 11, cursor: "pointer", textDecoration: "underline" }}>Reset day</button>
            )}
          </div>
        </div>
        <div style={{ height: 4, borderRadius: 2, background: "#222" }}>
          <div style={{ height: "100%", width: `${totalSets ? (completedSets/totalSets)*100 : 0}%`, background: day.color, borderRadius: 2, transition: "width 0.3s" }}/>
        </div>
      </div>

      {/* Rest Timer */}
      {restTimer && restLeft > 0 && (
        <div style={{ background: `${day.color}20`, border: `1px solid ${day.color}50`, borderRadius: 12, padding: "14px 16px", marginBottom: 16, display: "flex", justifyContent: "space-between", alignItems: "center" }}>
          <div>
            <div style={{ fontSize: 12, color: "#999" }}>Rest Timer</div>
            <div style={{ fontSize: 28, fontWeight: 700, fontFamily: "monospace", color: day.color }}>{Math.floor(restLeft/60)}:{String(restLeft%60).padStart(2,"0")}</div>
          </div>
          <button onClick={() => { setRestTimer(null); setRestLeft(0); }} style={{ background: "#333", border: "none", color: "#CCC", borderRadius: 8, padding: "8px 14px", fontSize: 13, cursor: "pointer" }}>Skip</button>
        </div>
      )}

      {/* Exercises */}
      {(() => {
        const renderSwapPicker = (primary, currentSwap, currentlyOmitted) => (
          <div style={{ padding: "10px 14px", borderTop: "1px solid #222", background: "#0E0E0E" }}>
            <div style={{ fontSize: 10, color: "#666", letterSpacing: 1, marginBottom: 8, fontFamily: "monospace" }}>SUBSTITUTE FOR {primary.name.toUpperCase()}</div>
            {primary.alts?.map(alt => {
              const isActive = currentSwap === alt.id;
              const resolved = resolveAlt(primary, alt.id);
              return (
                <button key={alt.id} onClick={() => { setSwap(primary.id, alt.id); setSwapPickerFor(null); }}
                  style={{
                    display: "block", width: "100%", textAlign: "left", padding: "8px 10px",
                    background: isActive ? `${day.color}25` : "#1A1A1A",
                    border: `1px solid ${isActive ? day.color : "#2A2A2A"}`,
                    borderRadius: 6, marginBottom: 4, color: isActive ? "#E8E8E8" : "#CCC", fontSize: 13, cursor: "pointer"
                  }}>
                  <span>{alt.name}</span>
                  <span style={{ marginLeft: 8, color: "#666", fontSize: 11, fontFamily: "monospace" }}>{resolved.sets}×{resolved.reps}</span>
                  {isActive && <span style={{ float: "right", color: day.color }}>✓</span>}
                </button>
              );
            })}
            <div style={{ display: "flex", gap: 6, marginTop: 10 }}>
              {currentSwap && (
                <button onClick={() => { clearSwap(primary.id); setSwapPickerFor(null); }}
                  style={{ flex: 1, padding: 8, background: "#222", border: "none", borderRadius: 6, color: "#CCC", fontSize: 12, cursor: "pointer" }}>
                  ↩ Use {primary.name}
                </button>
              )}
              {!currentlyOmitted && !currentSwap && (
                <button onClick={() => { toggleOmit(primary.id); setSwapPickerFor(null); }}
                  style={{ flex: 1, padding: 8, background: "#1A1A1A", border: "1px solid #3A2525", borderRadius: 6, color: "#C99", fontSize: 12, cursor: "pointer" }}>
                  Omit from report
                </button>
              )}
              {currentlyOmitted && (
                <button onClick={() => { toggleOmit(primary.id); setSwapPickerFor(null); }}
                  style={{ flex: 1, padding: 8, background: "#1A1A1A", border: "1px solid #253A25", borderRadius: 6, color: "#9C9", fontSize: 12, cursor: "pointer" }}>
                  Include
                </button>
              )}
              <button onClick={() => setSwapPickerFor(null)}
                style={{ padding: "8px 14px", background: "#222", border: "none", borderRadius: 6, color: "#666", fontSize: 12, cursor: "pointer" }}>
                Close
              </button>
            </div>
          </div>
        );

        const renderCard = (slot, { primary, accessory }) => {
          const exData = session[slot.id] || {};
          const last = getLast(slot.id, slot._scope || "day");
          const allDone = Array.from({ length: slot.sets }, (_, i) => exData[i]?.done).every(Boolean);
          const restSec = parseRest(slot.rest);
          const swapId = primary ? getSwap(primary.id) : null;
          const showPicker = primary && swapPickerFor === primary.id;
          const cardKey = primary ? primary.id : `acc-${slot.id}`;

          return (
            <div key={cardKey} style={{ background: allDone ? `${day.color}08` : "#151515", border: `1px solid ${allDone ? `${day.color}30` : "#222"}`, borderRadius: 14, marginBottom: 10, overflow: "hidden" }}>
              <div style={{ padding: "14px 14px 6px", display: "flex", justifyContent: "space-between", alignItems: "flex-start" }}>
                <div style={{ flex: 1 }}>
                  <div style={{ display: "flex", alignItems: "center", gap: 6, flexWrap: "wrap" }}>
                    <div style={{ fontSize: 15, fontWeight: 600, color: allDone ? "#888" : "#E8E8E8" }}>{slot.name}</div>
                    {swapId && <span style={{ fontSize: 9, color: day.color, background: `${day.color}22`, padding: "2px 6px", borderRadius: 4, letterSpacing: 1, fontFamily: "monospace" }}>SUB</span>}
                    {accessory && <span style={{ fontSize: 9, color: "#888", background: "#1A1A1A", border: "1px solid #2A2A2A", padding: "2px 6px", borderRadius: 4, letterSpacing: 1, fontFamily: "monospace" }}>ACC</span>}
                  </div>
                  {swapId && <div style={{ fontSize: 10, color: "#666", marginTop: 2 }}>in place of {primary.name}</div>}
                  <div style={{ fontSize: 12, color: "#666", fontFamily: "monospace", marginTop: 2 }}>{slot.sets} × {slot.reps} · rest {slot.rest}</div>
                </div>
                <div style={{ display: "flex", gap: 4 }}>
                  {primary && <button onClick={() => setSwapPickerFor(showPicker ? null : primary.id)} style={{ background: showPicker ? `${day.color}25` : "#1A1A1A", border: `1px solid ${showPicker ? day.color : "#2A2A2A"}`, color: showPicker ? day.color : "#888", borderRadius: 6, padding: "4px 10px", fontSize: 11, cursor: "pointer", fontFamily: "monospace" }}>Sub ▾</button>}
                  {accessory && <button onClick={() => removeAccessory(slot.id)} title="Remove" style={{ background: "#1A1A1A", border: "1px solid #2A2A2A", color: "#666", borderRadius: 6, padding: "4px 10px", fontSize: 11, cursor: "pointer", fontFamily: "monospace" }}>Remove</button>}
                  <button onClick={() => setHistoryView(slot.id)} style={{ background: "#222", border: "none", color: "#888", borderRadius: 6, padding: "4px 10px", fontSize: 11, cursor: "pointer", fontFamily: "monospace" }}>History</button>
                </div>
              </div>

              {showPicker && renderSwapPicker(primary, swapId, false)}

              {last && (
                <div style={{ padding: "0 14px 4px", fontSize: 11, color: "#555" }}>
                  Last ({last.date}): {Object.keys(last.data).filter(s => /^\d+$/.test(s)).sort((a,b)=>a-b).map(si => `${last.data[si].weight||"?"}x${last.data[si].reps||"?"}`).join(" / ")}
                </div>
              )}

              <div style={{ padding: "8px 14px 14px" }}>
                {Array.from({ length: slot.sets }, (_, si) => {
                  const sd = exData[si] || {};
                  const isActive = activeSet === `${slot.id}-${si}`;
                  const isDone = sd.done;

                  if (isDone && !isActive) {
                    return (
                      <div key={si} style={{ display: "flex", alignItems: "center", gap: 10, padding: "8px 10px", background: `${day.color}10`, borderRadius: 8, marginBottom: 4 }}>
                        <div style={{ width: 24, height: 24, borderRadius: 6, background: day.color, display: "flex", alignItems: "center", justifyContent: "center" }}>
                          <svg width="12" height="12" viewBox="0 0 16 16" fill="none"><path d="M3 8.5L6.5 12L13 4" stroke="#fff" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"/></svg>
                        </div>
                        <span style={{ fontSize: 13, color: "#999", fontFamily: "monospace" }}>Set {si+1}: {sd.weight||"--"} lb x {sd.reps||"--"}</span>
                        <button onClick={() => setActiveSet(`${slot.id}-${si}`)} style={{ marginLeft: "auto", background: "none", border: "none", color: "#555", fontSize: 11, cursor: "pointer" }}>Edit</button>
                      </div>
                    );
                  }

                  if (!isActive) {
                    return (
                      <button key={si} onClick={() => setActiveSet(`${slot.id}-${si}`)} style={{
                        display: "flex", alignItems: "center", gap: 10, padding: "10px", background: "#1A1A1A",
                        border: "1px solid #2A2A2A", borderRadius: 8, marginBottom: 4, cursor: "pointer", width: "100%", textAlign: "left",
                      }}>
                        <div style={{ width: 24, height: 24, borderRadius: 6, border: "2px solid #444", display: "flex", alignItems: "center", justifyContent: "center" }}>
                          <span style={{ fontSize: 11, color: "#666", fontWeight: 600 }}>{si+1}</span>
                        </div>
                        <span style={{ fontSize: 13, color: "#777" }}>Tap to log set {si+1}</span>
                      </button>
                    );
                  }

                  return (
                    <div key={si} style={{ padding: 12, background: `${day.color}12`, border: `1px solid ${day.color}40`, borderRadius: 10, marginBottom: 4 }}>
                      <div style={{ fontSize: 12, color: day.color, fontWeight: 600, marginBottom: 10 }}>Set {si+1}</div>
                      <div style={{ display: "flex", gap: 10, marginBottom: 12 }}>
                        <div style={{ flex: 1 }}>
                          <label style={{ fontSize: 11, color: "#888", display: "block", marginBottom: 4 }}>Weight (lb)</label>
                          <input type="number" inputMode="decimal" value={sd.weight||""} onChange={e => updateSet(slot.id, si, "weight", e.target.value)}
                            placeholder={last?.data?.[si]?.weight||"0"} autoFocus
                            style={{ width: "100%", padding: "10px 12px", background: "#1A1A1A", border: "1px solid #333", borderRadius: 8, color: "#E8E8E8", fontSize: 18, fontWeight: 700, fontFamily: "monospace", outline: "none", boxSizing: "border-box" }}
                          />
                        </div>
                        <div style={{ flex: 1 }}>
                          <label style={{ fontSize: 11, color: "#888", display: "block", marginBottom: 4 }}>Reps</label>
                          <input type="number" inputMode="numeric" value={sd.reps||""} onChange={e => updateSet(slot.id, si, "reps", e.target.value)}
                            placeholder={String(slot.reps).split("-")[0]||"0"}
                            style={{ width: "100%", padding: "10px 12px", background: "#1A1A1A", border: "1px solid #333", borderRadius: 8, color: "#E8E8E8", fontSize: 18, fontWeight: 700, fontFamily: "monospace", outline: "none", boxSizing: "border-box" }}
                          />
                        </div>
                      </div>
                      <div style={{ display: "flex", gap: 8 }}>
                        <button onClick={() => markDone(slot.id, si, restSec)} style={{ flex: 1, padding: 12, background: day.color, border: "none", borderRadius: 8, color: "#fff", fontSize: 14, fontWeight: 700, cursor: "pointer" }}>Done ✓</button>
                        <button onClick={() => setActiveSet(null)} style={{ padding: "12px 16px", background: "#333", border: "none", borderRadius: 8, color: "#999", fontSize: 13, cursor: "pointer" }}>Cancel</button>
                      </div>
                    </div>
                  );
                })}
              </div>
            </div>
          );
        };

        const primaryCards = day.exercises.map(primary => {
          const omittedEx = isOmitted(primary.id);
          const swapId = getSwap(primary.id);
          const showPicker = swapPickerFor === primary.id;

          if (omittedEx) {
            return (
              <div key={primary.id} style={{ background: "#101010", border: "1px dashed #2A2A2A", borderRadius: 14, marginBottom: 10, overflow: "hidden", opacity: 0.75 }}>
                <div style={{ padding: "12px 14px", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                  <div>
                    <div style={{ fontSize: 13, fontWeight: 600, color: "#666", textDecoration: "line-through" }}>{primary.name}</div>
                    <div style={{ fontSize: 10, color: "#555", fontFamily: "monospace", marginTop: 2, letterSpacing: 1 }}>OMITTED FROM REPORT</div>
                  </div>
                  <div style={{ display: "flex", gap: 4 }}>
                    <button onClick={() => setSwapPickerFor(showPicker ? null : primary.id)} style={{ background: showPicker ? `${day.color}25` : "#1A1A1A", border: `1px solid ${showPicker ? day.color : "#2A2A2A"}`, color: showPicker ? day.color : "#888", borderRadius: 6, padding: "4px 10px", fontSize: 11, cursor: "pointer", fontFamily: "monospace" }}>Sub ▾</button>
                    <button onClick={() => toggleOmit(primary.id)} style={{ background: "#222", border: "none", color: "#AAA", borderRadius: 6, padding: "4px 12px", fontSize: 11, cursor: "pointer", fontFamily: "monospace" }}>Include</button>
                  </div>
                </div>
                {showPicker && renderSwapPicker(primary, null, true)}
              </div>
            );
          }

          const slot = swapId
            ? { ...resolveAlt(primary, swapId), _swapFor: primary, _scope: "global" }
            : { ...primary, _scope: "day" };
          return renderCard(slot, { primary });
        });

        const accessoryCards = accessorySlots.map(slot => renderCard(slot, { accessory: true }));

        const availableAccessories = (ACCESSORIES[day.id] || []).filter(a => !accessoryIds.includes(a.id));
        const accessoryPicker = showAccessoryPicker ? (
          <div key="acc-picker" style={{ background: "#151515", border: "1px solid #2A2A2A", borderRadius: 14, padding: "12px 14px", marginBottom: 10 }}>
            <div style={{ fontSize: 11, color: "#888", letterSpacing: 1, marginBottom: 10, fontFamily: "monospace" }}>ADD ACCESSORY</div>
            {availableAccessories.length === 0 && <div style={{ fontSize: 12, color: "#666", padding: "6px 0" }}>All accessories already added.</div>}
            {availableAccessories.map(acc => (
              <button key={acc.id} onClick={() => { addAccessory(acc.id); setShowAccessoryPicker(false); }}
                style={{ display: "block", width: "100%", textAlign: "left", padding: "10px 12px", background: "#1A1A1A", border: "1px solid #2A2A2A", borderRadius: 6, marginBottom: 4, color: "#CCC", fontSize: 13, cursor: "pointer" }}>
                <span>{acc.name}</span>
                <span style={{ marginLeft: 8, color: "#666", fontSize: 11, fontFamily: "monospace" }}>{acc.sets}×{acc.reps}</span>
              </button>
            ))}
            <button onClick={() => setShowAccessoryPicker(false)} style={{ width: "100%", padding: 8, background: "#222", border: "none", borderRadius: 6, color: "#666", fontSize: 12, cursor: "pointer", marginTop: 6 }}>Close</button>
          </div>
        ) : (
          <button key="acc-add" onClick={() => setShowAccessoryPicker(true)}
            style={{ width: "100%", padding: "12px", background: "transparent", border: "1px dashed #333", borderRadius: 12, color: "#666", fontSize: 13, cursor: "pointer", marginBottom: 10 }}>
            + Add accessory
          </button>
        );

        return [...primaryCards, ...accessoryCards, accessoryPicker];
      })()}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("app")).render(<App />);
</script>
</body>
</html>
